  // ---------- Data loading ----------
  let refreshTimer = null;
  let upcomingTimer = null;

  async function bootstrap() {
    if (state.token) {
      try {
        const me = await api('/api/admin/me');
        state.user = me;
        state.shopId = me.shop_id;
        localStorage.setItem('shop_id', state.shopId);
        showApp();
        return;
      } catch (e) {
        // token bad, fall through to login
        logout(false);
      }
    }
    showLogin();
  }

  function showLogin() {
    $('#loginView').classList.remove('hidden');
    $('#appView').classList.add('hidden');
    setTimeout(() => $('#li_user')?.focus(), 50);
  }

  function showApp() {
    $('#loginView').classList.add('hidden');
    $('#appView').classList.remove('hidden');
    const u = state.user || {};
    const shop = u.shop || {};
    $('#userName').textContent = shop.name || u.shop_id || '店主';
    $('#userRole').textContent = (u.role || 'owner') + ' · ' + (u.shop_id || '');
    $('#userAvatar').textContent = (shop.name || u.shop_id || 'A').slice(0, 1).toUpperCase();
    $('#crumbShop').textContent = shop.name || u.shop_id || '';
    $('#livePill').style.display = '';
    // v4.10.1：按 role 隐藏 nav-item
    //   - "多店看板" 只给 platform_admin（单店 owner 看不到自己管不到的其他店）
    //   - 避免菜单显示但点击 403 的体验事故
    applyRoleBasedNavVisibility(u.role || 'owner');
    setView('dashboard');
    refreshAll();
    startAutoRefresh();
  }

  // v4.10.1 按 role 控制 nav-item 可见性
  //
  // 设计：
  //   - 后端用 auth.RequireRole 强约束（多店看板只给 platform_admin）
  //   - 前端同步隐藏菜单项，避免显示但点击 403 的体验事故
  //   - 加新 nav-item 时如果也有 role 约束，加到 ROLES_REQUIRED 字典里
  //
  // 约束：隐藏是单方向的——platform_admin 仍能看到所有 owner/staff 也能用的 nav-item
  // v4.10.1 按 role 控制 nav-item 可见性
  //
  // 设计：
  //   - 后端用 auth.RequireRole 强约束（多店看板只给 platform_admin）
  //   - 前端同步隐藏菜单项，避免显示但点击 403 的体验事故
  //   - 加新 nav-item 时如果也有 role 约束，加到 ROLES_REQUIRED 字典里
  //
  // 约束：隐藏是单方向的——platform_admin 仍能看到所有 owner/staff 也能用的 nav-item
  //
  // 重要：每个条目必须跟 storage/permissions.go 的 defaultRolePermissions 矩阵严格对应
  //   - 加新 perm 时务必同步加这里
  //   - storage/permissions.go 是真理之源，前端是缓存
  //   - v4.11.1 TODO: meHandler 返 permissions []string，前端直接用真 perm 驱动 nav 可见性
  //     （这个字典是"中间态"，长期会被 /api/admin/me 返的 perm 替换）
  const ROLES_REQUIRED = {
    'chain': ['platform_admin'],         // view:chain_dashboard：staff 故意禁
    'subscription': ['platform_admin'],   // view:subscription：staff 故意禁（v4.10.1 收紧）
    'chain-weekly': ['platform_admin'],   // view:chain_dashboard：staff 故意禁
    'members': ['owner'],                 // manage:members：v4.11 补前端；staff 故意禁
    'weekly': ['owner', 'platform_admin'],   // view:weekly_report：staff 故意禁（v4.10.1 收紧）
                                          //   修正：之前注释"全员能看"是错的，v4.10.1 起 staff 没 PermViewWeeklyReport
    'shop': ['owner', 'platform_admin'],     // edit:shop：staff 故意禁（改营业时间，误操作影响大）
    'services': ['owner', 'platform_admin'], // edit:services：staff 故意禁（v4.7 注释"改服务目录/价格，敏感"）
                                          //   staff 有 view:services 但没 edit:services，UI 进页面改不了，体验割裂 → 直接 hide
  };
  function applyRoleBasedNavVisibility(role) {
    $$('.nav-item[data-view]').forEach(el => {
      const view = el.dataset.view;
      const required = ROLES_REQUIRED[view];
      if (!required) return; // 没约束 → 所有人可见
      if (required.includes(role)) {
        el.style.display = '';
      } else {
        el.style.display = 'none';
      }
    });
  }

  async function loadUpcoming(silent = false) {
    try {
      const today = todayStr();
      const data = await api(`/api/shop/${encodeURIComponent(state.shopId)}/appointments?date=${today}&status=active`);
      const now = new Date();
      const cutoff = new Date(now.getTime() + 2 * 3600 * 1000);
      state.upcoming = (Array.isArray(data) ? data : [])
        .map(a => {
          const dt = new Date(`${a.date}T${a.time}:00`);
          return { ...a, _dt: dt, _minutes: Math.round((dt - now) / 60000) };
        })
        .filter(a => a._dt >= now && a._dt <= cutoff)
        .sort((a, b) => a._dt - b._dt);
      if (state.view === 'dashboard') {
        const ts = new Date().toLocaleTimeString();
        const tsEl = $('#upcomingTs'); if (tsEl) tsEl.textContent = '最近刷新：' + ts;
        const host = $('#upcomingList');
        if (host) {
          host.innerHTML = state.upcoming.length === 0
            ? renderEmpty('接下来 2 小时暂无预约', null, 'calendar')
            : '<div class="upcoming-grid">' + state.upcoming.map(renderUpcomingCard).join('') + '</div>';

      }
    } catch (e) { if (!silent) console.error('upcoming:', e); }
  }

  async function retryOneNotification(id, btn) {
    if (btn) { btn.disabled = true; btn.textContent = '发送中…'; }
    try {
      const res = await api(`/api/admin/notifications/${id}/retry`, { method: 'POST' });
      // res 可能是 409 already sent（不会到这里因为后端已经预先把按钮禁掉了）
      // 或者 200 { id, new_status }
      const ns = res && res.new_status;
      if (ns === 'sent') showToast('已补发成功', 'success');
      else if (ns === 'skipped') showToast('顾客仍无联系方式，已标 skipped', 'info');
      else if (ns === 'failed') showToast('补发仍失败：' + (res.error || '未知错误'), 'error');
      else showToast('补发完成：' + (ns || '未知'), 'info');
      await loadNotifications();
    } catch (e) {
      // 409 already sent 等
      showToast('补发失败：' + e.message, 'error');
      await loadNotifications();
    }
  }

  // v4.6 拉转人工的 resolved 事件（按 handoff event id 索引）
  async function loadHandoffsResolved() {
    try {
      // 拉最近 200 条 handoff_resolved 事件，解析 meta.resolved_from
      const data = await api('/api/admin/events?event_type=handoff_resolved&limit=200');
      const arr = Array.isArray(data) ? data : [];
      const map = {};
      for (const ev of arr) {
        let fromId = null;
        let note = '';
        try {
          if (ev.meta) {
            const m = JSON.parse(ev.meta);
            if (m.resolved_from) fromId = m.resolved_from;
            if (m.note) note = m.note;
          }
        } catch (_) { /* ignore */ }
        if (fromId == null) continue;
        // 只保留最新一条（按 created_at 倒序拉，已是最新在前）
        if (!map[fromId]) {
          map[fromId] = {
            resolved_at: ev.created_at,
            resolved_by: ev.ref_id || '',
            note: note,
          };
        }
      }
      state.handoffsResolved = map;
    } catch (_) {
      // 静默失败：不影响主流程
      state.handoffsResolved = state.handoffsResolved || {};
    }
  }

  // drill-down：点击 KPI / 告警 → 切 view + 应用 filter
  function drillDown(view, query) {
    if (!view) return;
    setView(view);
    // 应用 filter（按 view 分类）
    if (view === 'customers' && query && query.tag) {
      setTimeout(() => {
        const sel = $('#custTag');
        if (sel) { sel.value = query.tag; loadCustomers(); }
      }, 50);
    } else if (view === 'appointments' && query && query.status) {
      setTimeout(() => {
        const sel = $('#apptStatus');
        if (sel) { sel.value = query.status; loadAppointments(); }
      }, 50);
    } else {
      // 触发对应 view 的 loader
      setTimeout(() => {
        if (view === 'handoffs') loadHandoffs();
        else if (view === 'events') loadEvents();
        else if (view === 'leaves') loadLeaves();
        else if (view === 'subscription') loadSubscription();
        else if (view === 'shop') loadShop();
        else if (view === 'appointments') loadAppointments();
        else if (view === 'customers') loadCustomers();
        else if (view === 'notifications') loadNotifications();
      }, 50);
    }
  }

  // ---------- Actions ----------
  async function doLogin() {
    const u = $('#li_user').value.trim();
    const p = $('#li_pass').value;
    const err = $('#loginErr'), errText = $('#loginErrText');
    err.classList.add('hidden');
    if (!u || !p) { errText.textContent = '请填写用户名和密码'; err.classList.remove('hidden'); return; }
    const btn = $('#loginBtn'), btnText = $('#loginBtnText');
    btn.disabled = true; btnText.textContent = '登录中…';
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      if (!r.ok) {
        const j = await r.json().catch(() => ({}));
        errText.textContent = j.error || '登录失败（HTTP ' + r.status + '）';
        err.classList.remove('hidden');
        return;
      }
      const data = await r.json();
      state.token = data.token;
      state.shopId = data.shop_id;
      localStorage.setItem('jwt_token', state.token);
      localStorage.setItem('shop_id', state.shopId);
      $('#li_pass').value = '';
      // 拉一次 /me 校准 user
      const me = await api('/api/admin/me');

  // 简单 CSV 解析：支持双引号转义、换行符、首行表头
  function parseServiceCSV(text) {
    const result = { valid: [], invalid: [], headers: [] };
    if (!text) return result;
    const lines = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (c === '"') {
        if (inQuote && text[i + 1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if ((c === '\n' || c === '\r') && !inQuote) {
        if (cur.length > 0 || lines.length === 0) lines.push(cur);
        cur = '';
        if (c === '\r' && text[i + 1] === '\n') i++;
      } else {
        cur += c;
      }
    }
    if (cur.length > 0) lines.push(cur);

    if (lines.length === 0) return result;
    // 解析表头
    const headerLine = lines.shift();
    const headers = headerLine.split(',').map(s => s.trim().toLowerCase());
    result.headers = headers;
    const idxName = headers.findIndex(h => h === 'name' || h === '服务名' || h === '名称');
    const idxMin = headers.findIndex(h => h === 'estimated_min' || h === 'estimated' || h === 'min' || h === '预估时长' || h === '时长');
    const idxPrice = headers.findIndex(h => h === 'price_range' || h === 'price' || h === '价格');
    if (idxName === -1) {
      result.invalid.push({ line: 0, reason: '缺少 name / 服务名列', raw: headerLine });
      return result;
    }

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (!line.trim()) continue;
      const parts = splitCsvLine(line);
      const name = (parts[idxName] || '').trim();
      const minStr = (parts[idxMin] || '').trim();
      const price = (parts[idxPrice] || '').trim();
      const min = parseInt(minStr, 10);
      if (!name) {
        result.invalid.push({ line: i + 2, reason: '服务名空', raw: line });
        continue;
      }
      if (!min || min < 1 || min > 480) {
        result.invalid.push({ line: i + 2, reason: '预估时长必须在 1-480', raw: line });
        continue;
      }
      result.valid.push({ name, estimated_min: min, price_range: price });
    }
    return result;
  }

  function splitCsvLine(line) {
    const out = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQuote && line[i + 1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (c === ',' && !inQuote) {
        out.push(cur);
        cur = '';
      } else {
        cur += c;
      }
    }
    out.push(cur);
    return out;
  }

  function renderServiceImportPreview(rows) {
    const host = $('#svcImportPreview');
    const reportHost = $('#svcImportReport');
    if (!host) return;
    if (!rows || (rows.valid.length === 0 && rows.invalid.length === 0)) {
      host.innerHTML = '';
      if (reportHost) reportHost.innerHTML = '';
      return;
    }
    const total = rows.valid.length + rows.invalid.length;
    const summaryCls = rows.invalid.length === 0 ? 'ok' : (rows.valid.length === 0 ? 'fail' : 'partial');
    const summaryText = `共 ${total} 行 · 有效 ${rows.valid.length} · 无效 ${rows.invalid.length}`;

    let html = `<div class="import-report ${summaryCls}">${summaryText}</div>`;
    if (rows.invalid.length > 0) {
      html += '<ul style="font-size: 12px; color: var(--ink-muted); margin: 8px 0 0 18px;">';
      for (const inv of rows.invalid.slice(0, 5)) {
        html += `<li>第 ${inv.line} 行：${esc(inv.reason)} <span class="text-mono">${esc(inv.raw.slice(0, 50))}</span></li>`;
      }
      if (rows.invalid.length > 5) {
        html += `<li>…还有 ${rows.invalid.length - 5} 行无效</li>`;
      }
      html += '</ul>';
    }
    if (rows.valid.length > 0) {
      html += `<div style="margin-top: 12px; max-height: 200px; overflow-y: auto; border: 1px solid var(--line); border-radius: 8px;">`;
      html += '<table class="table" style="margin: 0;"><thead><tr><th>服务名</th><th>预估时长</th><th>价格区间</th></tr></thead><tbody>';
      for (const v of rows.valid.slice(0, 20)) {
        html += `<tr><td>${esc(v.name)}</td><td class="num">${v.estimated_min} 分钟</td><td>${esc(v.price_range || '—')}</td></tr>`;
      }
      if (rows.valid.length > 20) {
        html += `<tr><td colspan="3" class="text-muted" style="text-align: center;">…还有 ${rows.valid.length - 20} 条</td></tr>`;
      }
      html += '</tbody></table></div>';
    }
    host.innerHTML = html;
  }

  async function submitServiceImport() {
    const rows = state._importPreview;
    if (!rows || rows.valid.length === 0) {
      showToast('没有可导入的有效行', 'error');
      return;
    }
    const replace = $('#svcImportReplace')?.checked || false;
    const submitBtn = $('#svcImportSubmit');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '导入中…'; }
    try {
      const r = await api('/api/admin/services/import', {
        method: 'POST',
        body: {
          services: rows.valid,
          replace: replace,
        },
      });
      const cls = r.failed_count === 0 ? 'ok' : (r.success_count === 0 ? 'fail' : 'partial');
      let msg = `<strong>${r.success_count}</strong> 条导入成功`;
      if (r.skipped_count > 0) msg += ` · <strong>${r.skipped_count}</strong> 条同名跳过`;
      if (r.failed_count > 0) msg += ` · <strong>${r.failed_count}</strong> 条失败`;
      if (r.replaced_count > 0) msg += ` · 已软下架 <strong>${r.replaced_count}</strong> 条旧服务`;
      const reportHost = $('#svcImportReport');
      if (reportHost) {
        reportHost.innerHTML = `<div class="import-report ${cls}" style="margin-top:12px;">${msg}</div>`;
      }
      showToast(`导入完成：${r.success_count} 成功 / ${r.failed_count} 失败`, r.failed_count === 0 ? 'success' : 'info');
      // 刷新服务列表
      await loadServices();
      // 禁用提交按钮（已导入）
      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '已导入 ✓'; }
    } catch (e) {
      showToast('导入失败：' + e.message, 'error');
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '确认导入'; }
    }
  }

      else if (v === 'handoffs') loadHandoffs();
      else if (v === 'customers') loadCustomers();
      else if (v === 'services') loadServices();
      else if (v === 'subscription') loadSubscription();
      else if (v === 'shop') loadShop();
      else if (v === 'weekly') loadWeekly();
      else if (v === 'chain-weekly') loadChainWeekly();
      else if (v === 'notifications') loadNotifications();
      else if (v === 'members') loadMembers();
    }));
    // 顾客搜索回车支持（v4.4 轻打磨）
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && state.view === 'customers') {
        if ($('#custQuery') && document.activeElement === $('#custQuery')) {
          loadCustomers();
        }
      }
      // v4.6 ESC 关闭 modal
      if (e.key === 'Escape' && state.modal) {
        if (state.modal.kind !== 'confirm') closeModal();
      }
    });
    // initial load
    bootstrap();
  }

  // expose public API
  return {
    init, doLogin, logout,
    openModal, closeModal,
    openLeaveModal,
    openCustTagModal, openServiceModal, openRenewModal, openShopEditModal,
    openCustomerDetail, openHandoffResolveModal, openServiceImportModal,
    openMemberModal, openResetPasswordModal,
    submitNewBarber, submitLeave, submitChangePassword,
    submitCustTag, removeCustTag,
    submitService, deactivateService, activateService,
    submitMember, submitResetPassword, changeMemberRole, disableMember,
    submitRenew, submitShopEdit,
    submitHandoffResolve, submitServiceImport, onServiceImportFile, downloadServiceTemplate,
    resolveHandoff, switchChainWindow, toggleResolvedHandoffs,
    deleteBarber, activateBarber,
    markCompleted, markCancelled,
    loadAppointments, resetApptFilters, loadEvents, loadBarbers, loadLeaves, loadChain,
    loadHandoffs, loadCustomers, loadServices, loadSubscription, loadShop, loadMembers,
    loadWeekly, loadChainWeekly, resetWeekly, loadAlerts, drillDown,
    resetCustFilters,
    refreshCurrent,
    loadNotifications, retryOneNotification, retryAllFailedNotifications,
  };
})();

document.addEventListener('DOMContentLoaded', App.init);
</script>
