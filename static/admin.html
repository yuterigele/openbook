<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美发预约助手 · 商户后台</title>
  <style>
    /* ============================================================
       Design tokens — warm salon palette
       ============================================================ */
    :root {
      --canvas: #faf9f5;
      --surface: #ffffff;
      --surface-2: #f5f3eb;
      --line: #e8e6dc;
      --line-strong: #d4d0c0;
      --ink: #1c1917;
      --ink-2: #44403c;
      --ink-muted: #78716c;
      --ink-subtle: #a8a29e;
      --brand: #c26044;
      --brand-hover: #a8512f;
      --brand-soft: #faece2;
      --olive: #788c5d;
      --teal: #0f766e;
      --amber: #d97706;
      --red: #dc2626;
      --rose: #f43f5e;

      --shadow-xs: 0 1px 2px rgba(28, 25, 23, 0.04);
      --shadow-sm: 0 2px 4px rgba(28, 25, 23, 0.04), 0 1px 2px rgba(28, 25, 23, 0.03);
      --shadow-md: 0 4px 12px rgba(28, 25, 23, 0.06), 0 2px 4px rgba(28, 25, 23, 0.04);
      --shadow-lg: 0 12px 32px rgba(28, 25, 23, 0.10), 0 4px 8px rgba(28, 25, 23, 0.04);

      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;

      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", Menlo, Monaco, Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--canvas);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; }
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ============================================================
       Utility classes
       ============================================================ */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      font-size: 13px; font-weight: 500;
      transition: all .15s ease;
      box-shadow: var(--shadow-xs);
    }
    .btn:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: var(--brand); color: white; border-color: var(--brand); }
    .btn-primary:hover { background: var(--brand-hover); border-color: var(--brand-hover); }
    .btn-ghost { background: transparent; border-color: transparent; box-shadow: none; }
    .btn-ghost:hover { background: var(--surface-2); }
    .btn-danger { color: var(--red); border-color: var(--line); }
    .btn-danger:hover { background: #fef2f2; border-color: #fecaca; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xs);
    }
    .card-pad { padding: 20px; }
    .card-pad-sm { padding: 14px 18px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--ink-muted); font-weight: 500; }
    .input, .select, .textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      font-size: 13px;
      transition: border-color .15s, box-shadow .15s;
    }
    .input:focus, .select:focus, .textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(194, 96, 68, 0.12);
    }
    .textarea { min-height: 80px; resize: vertical; font-family: inherit; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px; font-weight: 500;
      background: var(--surface-2);
      color: var(--ink-2);
      white-space: nowrap;
    }
    .badge::before {
      content: ''; display: inline-block;
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; opacity: .55;
    }
    .badge::before { display: none; } /* strip the dot, cleaner */
    .badge-active { background: #ecfdf5; color: #047857; }
    .badge-completed { background: #f0fdf4; color: #166534; }
    .badge-noshow { background: #fef2f2; color: var(--red); }
    .badge-cancelled { background: var(--surface-2); color: var(--ink-muted); }
    .badge-warning { background: #fffbeb; color: var(--amber); }
    .badge-info { background: #f0fdfa; color: var(--teal); }

    .table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      font-size: 13px;
    }
    .table thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink-muted);
      background: var(--surface-2);
      border-bottom: 1px solid var(--line);
    }
    .table tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--ink-2);
    }
    .table tbody tr:last-child td { border-bottom: 0; }
    .table tbody tr { transition: background .12s; }
    .table tbody tr:hover { background: #fafaf5; }
    .table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .table .mono { font-family: var(--font-mono); font-size: 12px; }

    /* ============================================================
       Layout
       ============================================================ */
    .app {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100dvh;
    }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--line);
      display: flex; flex-direction: column;
      position: sticky; top: 0;
      height: 100dvh;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--line);
    }
    .brand-mark {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-hover) 100%);
      display: grid; place-items: center;
      color: white;
      box-shadow: var(--shadow-sm);
    }
    .brand-mark svg { width: 18px; height: 18px; }
    .brand-text { display: flex; flex-direction: column; line-height: 1.2; }
    .brand-text .t1 { font-size: 14px; font-weight: 600; color: var(--ink); }
    .brand-text .t2 { font-size: 11px; color: var(--ink-muted); }

    .nav { padding: 12px 8px; flex: 1; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius);
      color: var(--ink-2);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all .12s;
      user-select: none;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--ink); }
    .nav-item.active { background: var(--brand-soft); color: var(--brand); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-item .badge { margin-left: auto; padding: 0 6px; font-size: 10px; min-width: 18px; text-align: center; }

    .sidebar-foot {
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
    }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--surface-2);
      color: var(--ink-2);
      display: grid; place-items: center;
      font-size: 13px; font-weight: 600;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-info .name { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-info .role { font-size: 11px; color: var(--ink-muted); }
    .icon-btn {
      width: 28px; height: 28px;
      border: 0; background: transparent;
      border-radius: 6px;
      color: var(--ink-muted);
      display: grid; place-items: center;
      transition: all .12s;
    }
    .icon-btn:hover { background: var(--surface-2); color: var(--ink); }

    .main { display: flex; flex-direction: column; min-width: 0; }

    .topbar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 16px;
      padding: 14px 24px;
      background: rgba(250, 249, 245, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-muted); }
    .crumbs .sep { color: var(--ink-subtle); }
    .crumbs .current { color: var(--ink); font-weight: 500; }
    .topbar .spacer { flex: 1; }
    .live-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 11px; color: var(--ink-muted);
    }
    .live-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--olive);
      animation: breathe 2.4s ease-in-out infinite;
    }
    @keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    .content { padding: 24px; flex: 1; }
    .view-head { margin-bottom: 20px; }
    .view-head h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
    .view-head p { margin: 4px 0 0; color: var(--ink-muted); font-size: 13px; }

    /* ============================================================
       KPI grid
       ============================================================ */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow-xs);
      transition: all .15s;
    }
    .kpi:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .kpi .label { font-size: 12px; color: var(--ink-muted); font-weight: 500; }
    .kpi .value { margin-top: 4px; font-size: 28px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; font-variant-numeric: tabular-nums; }
    .kpi .sub { margin-top: 6px; font-size: 12px; color: var(--ink-muted); }
    .kpi.alert { border-color: rgba(220, 38, 38, 0.2); background: linear-gradient(180deg, #fffaf9 0%, var(--surface) 60%); }
    .kpi.success { border-color: rgba(120, 140, 93, 0.25); }

    .section { margin-top: 24px; }
    .section-head {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 12px;
    }
    .section-head h2 { margin: 0; font-size: 14px; font-weight: 600; color: var(--ink); }
    .section-head .sub { font-size: 12px; color: var(--ink-muted); }
    .section-head .spacer { flex: 1; }

    /* ============================================================
       Bar chart (top hours / barbers)
       ============================================================ */
    .bar-list { display: flex; flex-direction: column; gap: 8px; padding: 4px 0; }
    .bar-row {
      display: grid; grid-template-columns: 90px 1fr 50px;
      align-items: center; gap: 12px;
      font-size: 13px;
    }
    .bar-row .name { color: var(--ink-2); font-weight: 500; }
    .bar-row .bar {
      height: 8px; background: var(--surface-2); border-radius: 999px; overflow: hidden;
    }
    .bar-row .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand) 0%, #e89175 100%);
      border-radius: 999px;
      transition: width .4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .bar-row .num { text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-muted); }

    /* ============================================================
       Upcoming list
       ============================================================ */
    .upcoming-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }
    .upcoming-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      transition: all .15s;
    }
    .upcoming-card:hover { box-shadow: var(--shadow-sm); border-color: var(--line-strong); }
    .upcoming-card.urgent {
      border-color: rgba(220, 38, 38, 0.25);
      background: linear-gradient(135deg, #fff8f6 0%, var(--surface) 50%);
    }
    .upcoming-card.soon {
      border-color: rgba(217, 119, 6, 0.25);
      background: linear-gradient(135deg, #fffaf0 0%, var(--surface) 50%);
    }
    .upcoming-card .time-block {
      flex-shrink: 0;
      text-align: center;
      padding: 4px 10px;
      background: var(--surface-2);
      border-radius: 8px;
    }
    .upcoming-card.urgent .time-block { background: #fee2e2; color: var(--red); }
    .upcoming-card.soon .time-block { background: #fef3c7; color: var(--amber); }
    .upcoming-card .time-block .t { font-size: 18px; font-weight: 600; line-height: 1; }
    .upcoming-card .time-block .m { font-size: 10px; color: inherit; opacity: 0.7; margin-top: 2px; }
    .upcoming-card .body { flex: 1; min-width: 0; }
    .upcoming-card .body .name { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .upcoming-card .body .meta { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
    .upcoming-card .dist { font-size: 12px; color: var(--ink-muted); white-space: nowrap; }

    /* ============================================================
       Modals
       ============================================================ */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(28, 25, 23, 0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: grid; place-items: center;
      padding: 20px;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      width: 100%; max-width: 440px;
      box-shadow: var(--shadow-lg);
      animation: scaleIn .18s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .modal.lg { max-width: 560px; }
    @keyframes scaleIn {
      from { transform: scale(0.96); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-head {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
    }
    .modal-head h2 { margin: 0; font-size: 15px; font-weight: 600; }
    .modal-head .spacer { flex: 1; }
    .modal-body { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
    .modal-foot {
      padding: 14px 22px;
      border-top: 1px solid var(--line);
      display: flex; justify-content: flex-end; gap: 8px;
      background: var(--canvas);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }

    /* ============================================================
       Login
       ============================================================ */
    .login-page {
      min-height: 100dvh;
      display: grid;
      grid-template-columns: 1fr;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 20% 0%, rgba(194, 96, 68, 0.06) 0%, transparent 40%),
        radial-gradient(circle at 80% 100%, rgba(120, 140, 93, 0.06) 0%, transparent 40%),
        var(--canvas);
    }
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 32px;
      box-shadow: var(--shadow-md);
    }
    .login-card .brand {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      margin-bottom: 24px;
    }
    .login-card .brand .mark {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-hover) 100%);
      display: grid; place-items: center;
      color: white;
      box-shadow: var(--shadow-md);
    }
    .login-card .brand .mark svg { width: 26px; height: 26px; }
    .login-card h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .login-card .sub { font-size: 12px; color: var(--ink-muted); }

    .err-banner {
      padding: 10px 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--red);
      border-radius: var(--radius);
      font-size: 12px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ============================================================
       Empty / loading
       ============================================================ */
    .empty {
      padding: 36px 20px;
      text-align: center;
      color: var(--ink-muted);
    }
    .empty .icon { width: 40px; height: 40px; margin: 0 auto 12px; color: var(--ink-subtle); }
    .empty .title { font-size: 13px; font-weight: 500; color: var(--ink-2); }
    .empty .hint { font-size: 12px; margin-top: 4px; }

    .skel {
      background: linear-gradient(90deg, var(--surface-2) 0%, #ede9dc 50%, var(--surface-2) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ============================================================
       Filter bar
       ============================================================ */
    .filterbar {
      display: flex; align-items: flex-end; gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .filterbar .field { min-width: 140px; }

    /* ============================================================
       Responsive
       ============================================================ */
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        flex-direction: row;
        align-items: center;
        padding: 0;
        overflow-x: auto;
      }
      .sidebar-brand { border-bottom: 0; border-right: 1px solid var(--line); padding: 12px 16px; flex-shrink: 0; }
      .nav { display: flex; padding: 8px; gap: 4px; flex: 1; overflow-x: auto; }
      .nav-item { white-space: nowrap; padding: 7px 10px; font-size: 12px; }
      .nav-item .badge { display: none; }
      .sidebar-foot { display: none; }
      .content { padding: 16px; }
    }

    /* Scrollbar — make it warm */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 10px; border: 2px solid var(--canvas); }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-subtle); }

    .hidden { display: none !important; }
    .row { display: flex; align-items: center; gap: 8px; }
    .grow { flex: 1; }
    .text-muted { color: var(--ink-muted); }
    .text-subtle { color: var(--ink-subtle); }
    .text-mono { font-family: var(--font-mono); font-size: 12px; }
    .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }

    /* ============================================================
       v4.4 新增：表单 / 标签 / handoff / service / plan pill
       ============================================================ */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .kv-list {
      display: grid;
      grid-template-columns: 140px 1fr;
      row-gap: 10px;
      column-gap: 16px;
      font-size: 13px;
    }
    .kv-list .k { color: var(--ink-muted); }
    .kv-list .v { color: var(--ink); }
    .kv-list .v.mono { font-family: var(--font-mono); }

    .tag-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px; font-weight: 500;
      background: var(--surface-2);
      color: var(--ink-2);
      border: 1px solid var(--line);
      line-height: 1.5;
    }
    .tag-chip.tag-vip { background: #fef3c7; color: #b45309; border-color: #fcd34d; }
    .tag-chip.tag-frequent { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
    .tag-chip.tag-blacklist { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .tag-chip.tag-new { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .tag-chip.removable { cursor: pointer; }
    .tag-chip.removable:hover { background: #fafaf5; }
    .tag-chip .x { color: var(--ink-muted); font-weight: 600; }

    .handoff-list { display: flex; flex-direction: column; gap: 10px; }
    .handoff-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 3px solid var(--amber);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 16px;
      align-items: start;
    }
    .handoff-card .reason { font-weight: 500; color: var(--ink); }
    .handoff-card .meta { font-size: 12px; color: var(--ink-muted); }
    .handoff-card .ts { font-family: var(--font-mono); font-size: 11px; color: var(--ink-subtle); }
    .handoff-card .msg {
      grid-column: 1 / -1;
      margin-top: 6px;
      padding: 8px 10px;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--ink-2);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .plan-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px; font-weight: 600;
      background: var(--brand-soft);
      color: var(--brand);
    }
    .plan-pill.plan-pro { background: #eff6ff; color: #1d4ed8; }
    .plan-pill.plan-flagship { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; }
    .plan-pill.plan-expired { background: #fef2f2; color: var(--red); }

    .service-row {
      display: grid;
      grid-template-columns: 1fr 90px 100px 110px;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .service-row:last-child { border-bottom: 0; }
    .service-row.inactive { opacity: 0.5; }
    .service-row .name { font-weight: 500; color: var(--ink); }
    .service-row .price { color: var(--ink-muted); font-family: var(--font-mono); font-size: 12px; }

    /* v4.4 轻打磨：empty + skel 更柔和 */
    .empty {
      padding: 48px 20px;
      text-align: center;
      color: var(--ink-muted);
    }
    .empty .icon { width: 40px; height: 40px; margin: 0 auto 12px; color: var(--ink-subtle); opacity: 0.7; }
    .empty .title { font-size: 14px; font-weight: 500; color: var(--ink-2); margin-top: 8px; }
    .empty .hint { font-size: 12px; margin-top: 4px; color: var(--ink-muted); }

    /* v4.4 轻打磨：filter bar 在小屏不折行 */
    .filterbar .field { min-width: 120px; }

    /* ============================================================
       v4.5 告警 banner
       ============================================================ */
    .alerts-banner {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .alert-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 3px solid var(--ink-muted);
      border-radius: var(--radius);
      padding: 10px 16px;
      transition: all .15s;
    }
    .alert-item.alert-info { border-left-color: var(--ink-muted); background: var(--surface); }
    .alert-item.alert-warning { border-left-color: #d97706; background: #fffbeb; }
    .alert-item.alert-critical {
      border-left-color: var(--red);
      background: #fef2f2;
      animation: alertPulse 2s ease-in-out infinite;
    }
    @keyframes alertPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
      50% { box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.08); }
    }
    .alert-item:hover { box-shadow: var(--shadow-sm); transform: translateX(2px); }
    .alert-title { font-size: 13px; font-weight: 600; color: var(--ink); }
    .alert-desc { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }
    .alert-action { font-size: 11px; color: var(--brand); margin-top: 4px; }
  </style>
</head>

<script>
/* ================================================================
   App state + API client + views
   ================================================================ */
const App = (() => {
  // ---------- State ----------
  const state = {
    token: localStorage.getItem('jwt_token') || '',
    shopId: localStorage.getItem('shop_id') || '',
    user: null,            // { admin_id, shop_id, role, shop }
    view: 'dashboard',
    loading: false,

    // Data caches
    dashboard: null,
    upcoming: [],
    appointments: [],
    events: [],
    barbers: [],
    leaves: [],
    leavesByBarber: {},
    chainData: null,
    shop: null,           // v4.4 店铺信息
    handoffs: [],         // v4.4 转人工列表
    customers: [],        // v4.4 顾客列表
    services: [],         // v4.4 服务目录
    subscription: [],     // v4.4 订阅历史
    weekly: null,         // v4.4 周报（单店）
    chainWeekly: null,    // v4.4 周报（跨店）
    alerts: null,         // v4.5 dashboard 告警（B3）

    // Filters
    apptDate: todayStr(),
    apptStatus: '',
    eventType: '',

    // Modals
    modal: null,           // { kind, data? }
  };

  // ---------- API client ----------
  async function api(path, opts = {}) {
    const headers = { 'Accept': 'application/json' };
    if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
    if (opts.body && typeof opts.body !== 'string') {
      headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(opts.body);
    }
    const r = await fetch(path, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
    if (r.status === 401) {
      logout();
      throw new Error('登录已过期');
    }
    if (!r.ok) {
      const t = await r.text().catch(() => '');
      try { const j = JSON.parse(t); throw new Error(j.error || ('HTTP ' + r.status)); }
      catch (e) { if (e instanceof Error) throw e; throw new Error('HTTP ' + r.status + ': ' + t.slice(0, 100)); }
    }
    if (r.status === 204) return null;
    return await r.json();
  }

  // ---------- Helpers ----------
  function $(s, root = document) { return root.querySelector(s); }
  function $$(s, root = document) { return Array.from(root.querySelectorAll(s)); }
  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }
  function todayStr() {
    const d = new Date();
    const p = n => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
  }
  function toLocalInput(d) {
    const p = n => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate())
      + 'T' + p(d.getHours()) + ':' + p(d.getMinutes());
  }
  function fmtPct(x) { return (x * 100).toFixed(1) + '%'; }
  function fmtDate(s) { return s ? esc(s) : '—'; }
  function fmtTime(s) { return s ? esc(s.slice(0, 5)) : '—'; }
  function fmtRelative(min) {
    if (min < 0) return '已超时';
    if (min < 60) return min + ' 分钟后';
    const h = Math.floor(min / 60), m = min % 60;
    return h + ' 小时' + (m > 0 ? ' ' + m + ' 分' : '');
  }
  function showToast(msg, kind = 'info') {
    // minimal toast (top-right pill, auto-dismiss)
    let host = document.getElementById('toastHost');
    if (!host) {
      host = document.createElement('div');
      host.id = 'toastHost';
      host.style.cssText = 'position:fixed;top:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:8px;pointer-events:none;';
      document.body.appendChild(host);
    }
    const t = document.createElement('div');
    const color = kind === 'error' ? 'var(--red)' : kind === 'success' ? 'var(--olive)' : 'var(--ink)';
    t.style.cssText = `background:var(--surface);border:1px solid var(--line);border-left:3px solid ${color};padding:10px 14px;border-radius:8px;box-shadow:var(--shadow-md);font-size:13px;min-width:240px;max-width:380px;animation:scaleIn .18s ease;pointer-events:auto;`;
    t.textContent = msg;
    host.appendChild(t);
    setTimeout(() => { t.style.transition = 'opacity .2s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 220); }, 2800);
  }

  // ---------- View rendering ----------
  function setView(v) {
    state.view = v;
    $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === v));
    const labels = {
      dashboard: '实时看板', appointments: '预约管理', barbers: '理发师',
      leaves: '请假管理', events: '事件日志', chain: '多店看板',
      handoffs: '转人工', customers: '顾客', services: '服务目录',
      subscription: '订阅', shop: '店铺设置', weekly: '周报'
    };
    $('#crumbView').textContent = labels[v] || v;
    render();
  }

  function render() {
    const c = $('#content');
    if (state.view === 'dashboard') c.innerHTML = renderDashboard();
    else if (state.view === 'appointments') c.innerHTML = renderAppointments();
    else if (state.view === 'barbers') c.innerHTML = renderBarbers();
    else if (state.view === 'leaves') c.innerHTML = renderLeaves();
    else if (state.view === 'events') c.innerHTML = renderEvents();
    else if (state.view === 'chain') c.innerHTML = renderChain();
    else if (state.view === 'handoffs') c.innerHTML = renderHandoffs();
    else if (state.view === 'customers') c.innerHTML = renderCustomers();
    else if (state.view === 'services') c.innerHTML = renderServices();
    else if (state.view === 'subscription') c.innerHTML = renderSubscription();
    else if (state.view === 'shop') c.innerHTML = renderShop();
    else if (state.view === 'weekly') c.innerHTML = renderWeekly();
  }

  function renderEmpty(title, hint, iconName = 'inbox') {
    return `<div class="empty">
      ${icon(iconName, 40)}
      <div class="title">${esc(title)}</div>
      ${hint ? `<div class="hint">${esc(hint)}</div>` : ''}
    </div>`;
  }

  function renderSkeleton(rows = 4) {
    return Array(rows).fill(0).map(() =>
      '<div class="skel" style="height:36px;margin-bottom:8px;"></div>'
    ).join('');
  }

  // ---------- Dashboard view ----------
  function renderDashboard() {
    const d = state.dashboard;
    if (!d) {
      return `<div class="kpi-grid">${renderSkeleton(4)}</div>
        <div class="card card-pad section">${renderSkeleton(6)}</div>`;
    }
    const today = d.today || {};
    const week = d.week || {};
    const month = d.month || {};
    const handoffN = d.handoff_pending_today || 0;
    const handoffClass = handoffN > 0 ? 'alert' : 'success';

    return `
      <div class="view-head">

  function kpiCard(label, value, variant = 'normal', sub, linkTo, linkQuery) {
    const cls = variant === 'alert' ? 'alert' : variant === 'success' ? 'success' : '';
    const clickable = linkTo ? `onclick="App.drillDown('${esc(linkTo)}', ${JSON.stringify(linkQuery || {}).replace(/"/g, '&quot;')})" style="cursor:pointer;"` : '';
    const hint = linkTo ? '<span style="opacity:0.5;margin-left:4px;">↗</span>' : '';
    return `<div class="kpi ${cls}" ${clickable}>
      <div class="label">${esc(label)}${hint}</div>
      <div class="value">${esc(value)}</div>
      <div class="sub">${esc(sub || '')}</div>
    </div>`;
  }

  // 告警 banner（dashboard 顶部）
  function renderAlertsBanner() {
    const a = state.alerts;
    if (!a || !a.alerts || a.alerts.length === 0) return '';
    const items = a.alerts.map(al => {
      const sev = al.severity || 'info';
      const action = al.action || {};
      const click = action.view
        ? `onclick="App.drillDown('${esc(action.view)}', ${JSON.stringify(parseQuery(action.query)).replace(/"/g, '&quot;')})" style="cursor:pointer;"`
        : '';
      return `<div class="alert-item alert-${esc(sev)}" ${click}>
        <div class="alert-title">${esc(al.title)}</div>
        ${al.description ? `<div class="alert-desc">${esc(al.description)}</div>` : ''}
        ${action.view ? '<div class="alert-action">点击查看 →</div>' : ''}
      </div>`;
    }).join('');
    return `<div class="alerts-banner">${items}</div>`;
  }

  // 把 "tag=BLACKLIST&foo=bar" 转成对象
  function parseQuery(q) {
    if (!q) return {};
    return q.split('&').reduce((acc, p) => {
      const [k, v] = p.split('=');
      if (k) acc[k] = v || '';
      return acc;
    }, {});
  }

  function renderBarList(rows) {
    if (!rows || rows.length === 0) return renderEmpty('暂无数据', null, 'chart');
    const max = Math.max(...rows.map(r => r.count), 1);
    return '<div class="bar-list">' + rows.map(r => `
      <div class="bar-row">
        <div class="name">${esc(r.name)}</div>
        <div class="bar"><div class="fill" style="width:${(r.count / max * 100).toFixed(1)}%;"></div></div>
        <div class="num">${r.count}</div>
      </div>
    `).join('') + '</div>';
  }

  function renderUpcomingCard(a) {
    const dist = a._minutes;
    const cls = dist <= 15 ? 'urgent' : dist <= 60 ? 'soon' : '';
    const [h, m] = a.time.split(':');
    return `<div class="upcoming-card ${cls}">
      <div class="time-block">
        <div class="t">${h}:${m}</div>
        <div class="m">${fmtRelative(dist)}</div>
      </div>
      <div class="body">
        <div class="name">${esc(a.barber_name)} · ${esc(a.customer || '匿名顾客')}</div>
        <div class="meta">${esc(a.service || '')}</div>
      </div>
      <button class="btn btn-sm" onclick="App.markCompleted('${a.id}')">完成</button>
    </div>`;
  }

  function renderEventFunnel(rows) {
    if (!rows.length) return renderEmpty('本月暂无埋点', '续费漏斗事件会在用户预约、爽约、续费等节点写入', 'activity');

    return '<div class="bar-list">' + rows.map(r => `

        <div class="bar"><div class="fill" style="width:${(r.count / max * 100).toFixed(1)}%;"></div></div>

    `).join('') + '</div>';
  }

      <td class="num">${c.no_show_count || 0}</td>
      <td class="num">${c.late_cancel_count || 0}</td>
      <td class="text-muted text-mono">${esc(lastVisit)}</td>
      <td class="num">
        <button class="btn btn-sm" onclick="App.openCustTagModal('${esc(c.id)}','${esc(c.name || '')}')">+ 标签</button>

      <h1>服务目录</h1>

  function renderServiceRow(s) {
    return `<div class="service-row ${s.is_active ? '' : 'inactive'}">
      <div class="name">${esc(s.name)} ${s.is_active ? '' : '<span class="text-muted" style="font-weight:400;font-size:11px;">· 已下架</span>'}</div>
      <div class="text-muted text-mono">${s.estimated_min || 0} 分钟</div>
      <div class="price">${esc(s.price_range || '—')}</div>
      <div class="num">
        <button class="btn btn-sm" onclick="App.openServiceModal('${esc(s.id)}')">编辑</button>
        ${s.is_active
          ? `<button class="btn btn-sm btn-danger" onclick="App.deactivateService('${esc(s.id)}','${esc(s.name)}')">下架</button>`
          : `<button class="btn btn-sm" onclick="App.activateService('${esc(s.id)}','${esc(s.name)}')">上架</button>`}
      </div>
    </div>`;

  // ---------- Subscription view (v4.4) ----------
  function renderSubscription() {
    const list = state.subscription || [];
    const current = list.find(s => s.is_current);
    return `<div class="view-head">
      <h1>订阅</h1>
      <p>当前订阅 + 历次续费记录</p>
    </div>

    ${current ? `<div class="card card-pad section">
      <div class="section-head">
        <h2>当前订阅</h2>
        <span class="spacer"></span>
        <button class="btn btn-primary" onclick="App.openRenewModal()">${icon('plus', 14)} 续费</button>
      </div>
      <div class="kv-list">
        <div class="k">套餐</div><div class="v">${planPill(current.plan)}</div>
        <div class="k">开始</div><div class="v mono">${esc(current.started_at.slice(0, 10))}</div>
        <div class="k">到期</div><div class="v mono">${esc(current.expires_at.slice(0, 10))}</div>
        <div class="k">剩余天数</div><div class="v">${daysLeft(current.expires_at)} 天</div>
        <div class="k">自动续费</div><div class="v">${current.auto_renew ? '已开启' : '未开启'}</div>
      </div>
    </div>` : `<div class="card card-pad section">
      <div class="section-head">
        <h2>当前无有效订阅</h2>
        <span class="spacer"></span>
        <button class="btn btn-primary" onclick="App.openRenewModal()">${icon('plus', 14)} 续费</button>
      </div>
      ${renderEmpty('尚未订阅或已过期', '点右上角"续费"开通', 'inbox')}
    </div>`}

    <div class="section">
      <div class="card">
        <div class="section-head card-pad-sm" style="border-bottom:1px solid var(--line);">
          <h2 style="font-size:14px;">续费历史</h2>
          <span class="sub">${list.length} 条</span>
        </div>
        ${list.length === 0
          ? '<div style="padding:20px;">' + renderEmpty('还没有续费记录', null, 'calendar') + '</div>'
          : `<table class="table">
            <thead><tr><th>套餐</th><th>开始</th><th>到期</th><th>状态</th><th>自动续费</th></tr></thead>
            <tbody>${list.map(s => `<tr>
              <td>${planPill(s.plan)}</td>
              <td class="text-mono">${esc(s.started_at.slice(0,10))}</td>
              <td class="text-mono">${esc(s.expires_at.slice(0,10))}</td>
              <td>${s.is_current ? '<span class="badge badge-active">生效中</span>' : (s.cancelled_at ? '<span class="badge badge-cancelled">已取消</span>' : '<span class="badge badge-warning">已过期</span>')}</td>
              <td>${s.auto_renew ? '是' : '否'}</td>
            </tr>`).join('')}</tbody>
          </table>`}
      </div>
    </div>`;
  }

  function planPill(plan) {
    const cls = plan === 'flagship' ? 'plan-flagship' : plan === 'pro' ? 'plan-pro' : '';
    const label = plan === 'flagship' ? '旗舰' : plan === 'pro' ? '专业' : plan === 'basic' ? '基础' : (plan || '—');
    return `<span class="plan-pill ${cls}">${esc(label)}</span>`;
  }

  function daysLeft(expiresAt) {
    if (!expiresAt) return 0;
    const ms = new Date(expiresAt) - new Date();
    return Math.max(0, Math.ceil(ms / (24 * 3600 * 1000)));
  }

  // ---------- Shop view (v4.4) ----------
  function renderShop() {
    const s = state.shop;
    if (!s) {
      return `<div class="view-head">
        <h1>店铺设置</h1>
        <p>营业时间、午休、节假日、地址等</p>
      </div>
      <div class="card card-pad">${renderSkeleton(4)}</div>`;
    }
    return `<div class="view-head">
      <h1>店铺设置</h1>
      <p>仅影响本店；wecom / plan / expires_at 走专门入口</p>
    </div>
    <div class="card card-pad">
      <div class="section-head">
        <h2>基本信息</h2>
        <span class="spacer"></span>
        <button class="btn" onclick="App.openShopEditModal()">${icon('plus', 14)} 编辑</button>
      </div>
      <div class="kv-list">
        <div class="k">店铺名</div><div class="v">${esc(s.name || '—')}</div>
        <div class="k">地址</div><div class="v">${esc(s.address || '—')}</div>
        <div class="k">时区</div><div class="v mono">${esc(s.timezone || 'Asia/Shanghai')}</div>
        <div class="k">营业时间</div><div class="v mono">${pad(s.open_hour)}:00 - ${pad(s.close_hour)}:00</div>
        <div class="k">午休</div><div class="v mono">${pad(s.lunch_start)}:00 - ${pad(s.lunch_end)}:${pad(s.lunch_end_min || 0)}</div>
        <div class="k">节假日</div><div class="v">${renderHolidays(s.holidays)}</div>
        <div class="k">订阅套餐</div><div class="v">${planPill(s.plan)}</div>
        <div class="k">到期日</div><div class="v mono">${esc((s.expires_at || '').slice(0,10) || '—')}</div>
      </div>
    </div>
    <div class="section">
      <div class="card card-pad text-muted" style="font-size:12px;">
        <strong>企业微信配置</strong>不在此处修改（多店版本按店独立，走 env 注入；如需变更请改 <span class="text-mono">.env</span> 后重启服务）
      </div>
    </div>`;
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function renderHolidays(s) {
    if (!s) return '<span class="text-muted">未设置</span>';
    const arr = s.split(',').map(x => x.trim()).filter(Boolean);
    if (!arr.length) return '<span class="text-muted">未设置</span>';
    return arr.map(d => `<span class="tag-chip">${esc(d)}</span>`).join(' ');
  }

  // ---------- Weekly report view (v4.3 PRD §11.12 增量) ----------
  function renderWeekly() {
    return `<div class="view-head">
      <h1>周报</h1>
      <p>最近 7 天经营数据 + 周环比。跨店看底部"连锁汇总"。每周一 9:00 自动邮件到 REPORT_TO</p>
    </div>
    <div class="filterbar">
      <div class="field">
        <label>截止日（as_of 之后 7 天为本周）</label>
        <input class="input" type="date" id="weeklyAsOf" value="${esc(state.weeklyAsOf || todayStr())}" />
      </div>
      <button class="btn btn-primary" onclick="App.loadWeekly()">查询</button>
      <button class="btn btn-ghost" onclick="App.resetWeekly()">重置</button>
      <span class="spacer"></span>
      <span class="text-muted" id="weeklyTs" style="font-size:12px;"></span>
    </div>

    <div id="weeklyBody">
      ${state.weekly ? renderWeeklyBody(state.weekly) : '<div class="card card-pad">' + renderSkeleton(4) + '</div>'}
    </div>

    <div class="section" id="chainWeeklySection">
      <div class="card">
        <div class="section-head card-pad-sm" style="border-bottom:1px solid var(--line);">
          <h2 style="font-size:14px;">连锁汇总</h2>
          <span class="sub">所有店铺本周合计</span>
        </div>
        <div id="chainWeeklyBody" style="padding:16px;">
          ${state.chainWeekly ? renderChainWeeklyBody(state.chainWeekly) : '<div class="text-muted" style="font-size:12px;">加载中…</div>'}
        </div>
      </div>
    </div>`;
  }

  function renderWeeklyBody(r) {
    const start = r.window_start ? r.window_start.slice(0, 10) : '—';
    const end = r.window_end ? r.window_end.slice(0, 10) : '—';
    const total = r.total_appointments || 0;
    const completed = r.completed_appointments || 0;
    const noshow = r.noshow_appointments || 0;
    const cancelled = r.cancelled_appointments || 0;
    const active = r.active_appointments || 0;
    const growthPct = (r.total_growth_rate * 100).toFixed(1);
    const growthCls = r.total_growth_rate > 0 ? 'success' : r.total_growth_rate < 0 ? 'alert' : 'normal';
    const growthSign = r.total_growth_rate > 0 ? '+' : '';

    return `
      <div class="kpi-grid">
        ${kpiCard('总预约', total, 'info', `${start} ~ ${end}`)}
        ${kpiCard('已完成', completed, 'success', `完成率 ${fmtPct(r.completion_rate || 0)}`)}
        ${kpiCard('爽约', noshow, noshow > 0 ? 'alert' : 'normal', `爽约率 ${fmtPct(r.noshow_rate || 0)}`)}
        ${kpiCard('已取消', cancelled, 'normal', '')}
        ${kpiCard('待到店', active, 'normal', '')}
        ${kpiCard('周环比（总数）', growthSign + growthPct + '%', growthCls,
          `上周 ${r.last_week_total} 单 → 本周 ${total} 单`)}
      </div>

      <div class="section">
        <div class="card card-pad">
          <div class="section-head">
            <h2>7 天日趋势</h2>
            <span class="sub">${(r.daily_trend || []).length} 天</span>
          </div>
          ${renderWeeklyDailyChart(r.daily_trend || [])}
        </div>
      </div>

      <div class="section" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="card card-pad">
          <div class="section-head">
            <h2>服务排行</h2>
            <span class="sub">Top ${(r.service_rank || []).length}</span>
          </div>
          ${renderRankList((r.service_rank || []).map(s => ({ name: s.name, count: s.count })))}
        </div>
        <div class="card card-pad">
          <div class="section-head">
            <h2>顾客排行</h2>
            <span class="sub">Top ${(r.top_customers || []).length}</span>
          </div>
          ${renderRankList((r.top_customers || []).map(c => ({ name: c.name || '匿名', count: c.count })))}
        </div>
      </div>`;
  }

  function renderWeeklyDailyChart(rows) {
    if (!rows.length) return renderEmpty('暂无 7 天数据', null, 'chart');
    const max = Math.max(...rows.map(r => r.count || 0), 1);
    // 周一在前（v4.3 默认就是 [now-7d, now) ASC；后端 fillDailyTrend 已补 0）
    return '<div class="bar-list">' + rows.map(r => {
      const date = (r.date || '').slice(5); // MM-DD
      const dow = weekdayOf(r.date);
      return `<div class="bar-row" style="grid-template-columns: 70px 1fr 40px;">
        <div class="name text-mono">${esc(date)} ${esc(dow)}</div>
        <div class="bar"><div class="fill" style="width:${((r.count || 0) / max * 100).toFixed(1)}%;"></div></div>
        <div class="num">${r.count || 0}</div>
      </div>`;
    }).join('') + '</div>';
  }

  function weekdayOf(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d)) return '';
    return '周' + '日一二三四五六'[d.getDay()];
  }

  function renderRankList(rows) {
    if (!rows.length) return renderEmpty('暂无数据', null, 'user');
    const max = Math.max(...rows.map(r => r.count), 1);
    return '<div class="bar-list">' + rows.map((r, i) => {
      const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
      return `<div class="bar-row" style="grid-template-columns: 24px 90px 1fr 50px;">
        <div style="text-align:center;">${medal}</div>
        <div class="name">${esc(r.name)}</div>
        <div class="bar"><div class="fill" style="width:${(r.count / max * 100).toFixed(1)}%;"></div></div>
        <div class="num">${r.count}</div>
      </div>`;
    }).join('') + '</div>';
  }

  function renderChainWeeklyBody(c) {
    const t = c.total || {};
    const ps = c.per_shop || [];
    if (!ps.length) return renderEmpty('暂无店铺数据', '至少需要一家店有过本周预约', 'building');
    return `
      <div class="kv-list" style="margin-bottom:12px;">
        <div class="k">门店数</div><div class="v">${c.shop_count || 0}</div>
        <div class="k">窗口</div><div class="v mono">${esc((c.window_start || '').slice(0,10))} ~ ${esc((c.window_end || '').slice(0,10))}</div>
        <div class="k">总预约</div><div class="v">${t.total_appointments || 0}</div>
        <div class="k">完成率</div><div class="v">${fmtPct(t.completion_rate || 0)}</div>
        <div class="k">爽约率</div><div class="v">${fmtPct(t.noshow_rate || 0)}</div>
      </div>
      <table class="table">
        <thead><tr><th>门店</th><th class="num">预约</th><th class="num">完成</th><th class="num">爽约</th><th class="num">完成率</th></tr></thead>
        <tbody>${ps.map(s => `<tr>
          <td><strong>${esc(s.shop_name || s.shop_id)}</strong></td>
          <td class="num">${s.total_appointments || 0}</td>
          <td class="num">${s.completed_appointments || 0}</td>
          <td class="num">${s.noshow_appointments || 0}</td>
          <td class="num">${fmtPct(s.completion_rate || 0)}</td>
        </tr>`).join('')}</tbody>
      </table>`;
  }

  // ---------- Icons ----------
  function icon(name, size = 18) {
    const s = size;
    const c = `width:${s};height:${s};`;
    const paths = {
      plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
      x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
      inbox: '<polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>',
      calendar: '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
      chart: '<line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/>',
      search: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
      'user-plus': '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>',
      user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
      building: '<path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/><line x1="9" y1="9" x2="9" y2="9"/><line x1="9" y1="12" x2="9" y2="12"/><line x1="9" y1="15" x2="9" y2="15"/><line x1="9" y1="18" x2="9" y2="18"/>',
      activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
    };
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="${c}">${paths[name] || ''}</svg>`;
  }

  // ---------- Modals ----------
  function openModal(kind, data) {
    state.modal = { kind, data };
    const root = $('#modalRoot');
    let body = '';
    if (kind === 'newBarber') body = newBarberModal();
    else if (kind === 'leave') body = leaveModal(data);
    else if (kind === 'password') body = passwordModal();
    else if (kind === 'confirm') body = confirmModal(data);
    else if (kind === 'custTag') body = custTagModal(data);
    else if (kind === 'service') body = serviceModal(data);
    else if (kind === 'renew') body = renewModal();
    else if (kind === 'shopEdit') body = shopEditModal();
    else return;
    root.innerHTML = body;
    // wire submit buttons by id
    if (kind === 'newBarber') {
      $('#newBarberName')?.focus();
      $('#newBarberName').addEventListener('keydown', e => { if (e.key === 'Enter') $('#newBarberSkills').focus(); });
    } else if (kind === 'leave') {
      $('#leaveStartAt')?.focus();
    } else if (kind === 'password') {
      $('#oldPwd')?.focus();
    } else if (kind === 'service') {
      $('#svcName')?.focus();
    } else if (kind === 'shopEdit') {
      $('#shopName')?.focus();
    }
  }
  function closeModal() {
    state.modal = null;
    $('#modalRoot').innerHTML = '';
  }

  function newBarberModal() {
    return `<div class="modal-backdrop" onclick="if(event.target===this)App.closeModal()">
      <div class="modal">
        <div class="modal-head">
          <h2>新增理发师</h2>
          <div class="spacer"></div>
          <button class="icon-btn" onclick="App.closeModal()">${icon('x', 16)}</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>姓名 <span class="text-muted" style="font-weight:400;">(必填, 1-32 字)</span></label>
            <input class="input" id="newBarberName" maxlength="32" placeholder="例如：Tony、Kevin" />
          </div>
          <div class="field">
            <label>技能标签 <span class="text-muted" style="font-weight:400;">(可选, 逗号分隔)</span></label>
            <input class="input" id="newBarberSkills" maxlength="256" placeholder="例如：剪发,染发,烫发" />
          </div>
          <div id="newBarberErr" class="err-banner hidden"></div>

        <div class="modal-foot">

        </div>
      </div>
    </div>`;
  }

  function leaveModal(data) {
    const now = new Date();
    const tomorrow = new Date(now.getTime() + 24*3600*1000);
    return `<div class="modal-backdrop" onclick="if(event.target===this)App.closeModal()">
      <div class="modal lg">
        <div class="modal-head">
          <h2>给 <span style="color:var(--brand);">${esc(data.barberName)}</span> 请假</h2>
          <div class="spacer"></div>
          <button class="icon-btn" onclick="App.closeModal()">${icon('x', 16)}</button>
        </div>
        <div class="modal-body">
          <div class="row" style="gap:12px;">
            <div class="field grow">
              <label>开始时间</label>
              <input class="input" type="datetime-local" id="leaveStartAt" value="${toLocalInput(now)}" />
            </div>
            <div class="field grow">
              <label>结束时间</label>
              <input class="input" type="datetime-local" id="leaveEndAt" value="${toLocalInput(tomorrow)}" />

            <label>处理方式</label>

              <option value="reschedule">改派到其他理发师（改派失败的自动取消）</option>

          <div id="leaveErr" class="err-banner hidden"></div>
        </div>
        <div class="modal-foot">
          <button class="btn" onclick="App.closeModal()">取消</button>
          <button class="btn btn-primary" onclick="App.submitLeave()">提交请假</button>
        </div>
      </div>

  // ---------- Data loading ----------
  let refreshTimer = null;
  let upcomingTimer = null;

  async function bootstrap() {
    if (state.token) {
      try {
        const me = await api('/api/admin/me');
        state.user = me;
        state.shopId = me.shop_id;
        localStorage.setItem('shop_id', state.shopId);
        showApp();
        return;
      } catch (e) {
        // token bad, fall through to login
        logout(false);
      }
    }
    showLogin();
  }

  function showLogin() {
    $('#loginView').classList.remove('hidden');
    $('#appView').classList.add('hidden');
    setTimeout(() => $('#li_user')?.focus(), 50);
  }

  function showApp() {
    $('#loginView').classList.add('hidden');
    $('#appView').classList.remove('hidden');
    const u = state.user || {};
    const shop = u.shop || {};
    $('#userName').textContent = shop.name || u.shop_id || '店主';
    $('#userRole').textContent = (u.role || 'owner') + ' · ' + (u.shop_id || '');
    $('#userAvatar').textContent = (shop.name || u.shop_id || 'A').slice(0, 1).toUpperCase();
    $('#crumbShop').textContent = shop.name || u.shop_id || '';
    $('#livePill').style.display = '';
    setView('dashboard');
    refreshAll();
    startAutoRefresh();
  }

  function startAutoRefresh() {
    stopAutoRefresh();
    refreshTimer = setInterval(() => {
      if (state.view === 'dashboard') refreshAll(true);
      else if (state.view === 'handoffs') loadHandoffs();
    }, 30 * 1000);
    upcomingTimer = setInterval(() => {
      if (state.view === 'dashboard') loadUpcoming(true);
    }, 30 * 1000);
  }
  function stopAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    if (upcomingTimer) clearInterval(upcomingTimer);
    refreshTimer = upcomingTimer = null;
  }

  async function refreshAll(silent = false) {
    if (!silent) state.loading = true;
    try {
      await Promise.all([
        loadDashboard(silent),
        loadUpcoming(silent),
        loadLeavesBadge(),
        loadHandoffsBadge(),
        loadAlerts(silent),
      ]);
    } finally { state.loading = false; }
  }

  async function loadDashboard(silent = false) {
    if (!silent) state.dashboard = null;
    if (state.view === 'dashboard') render();
    try {
      const d = await api(`/api/shop/${encodeURIComponent(state.shopId)}/dashboard`);
      state.dashboard = d;
      if (state.view === 'dashboard') render();
    } catch (e) {
      if (!silent) showToast('看板加载失败：' + e.message, 'error');
    }
  }

  async function loadUpcoming(silent = false) {
    try {
      const today = todayStr();
      const data = await api(`/api/shop/${encodeURIComponent(state.shopId)}/appointments?date=${today}&status=active`);
      const now = new Date();
      const cutoff = new Date(now.getTime() + 2 * 3600 * 1000);
      state.upcoming = (Array.isArray(data) ? data : [])
        .map(a => {
          const dt = new Date(`${a.date}T${a.time}:00`);
          return { ...a, _dt: dt, _minutes: Math.round((dt - now) / 60000) };
        })
        .filter(a => a._dt >= now && a._dt <= cutoff)
        .sort((a, b) => a._dt - b._dt);
      if (state.view === 'dashboard') {
        const ts = new Date().toLocaleTimeString();
        const tsEl = $('#upcomingTs'); if (tsEl) tsEl.textContent = '最近刷新：' + ts;
        const host = $('#upcomingList');
        if (host) {
          host.innerHTML = state.upcoming.length === 0
            ? renderEmpty('接下来 2 小时暂无预约', null, 'calendar')
            : '<div class="upcoming-grid">' + state.upcoming.map(renderUpcomingCard).join('') + '</div>';
        }
      }
    } catch (e) { if (!silent) console.error('upcoming:', e); }
  }

    const status = $('#apptStatus')?.value || '';

    if (host) host.innerHTML = renderSkeleton(5);

      const data = await api(url);
      state.appointments = Array.isArray(data) ? data : [];
      $('#apptTs').textContent = '最近刷新：' + new Date().toLocaleTimeString();
      if (host) {
        host.innerHTML = state.appointments.length === 0
          ? renderEmpty('该条件下暂无预约', '试试切换日期或重置筛选', 'calendar')

    } catch (e) {

  // drill-down：点击 KPI / 告警 → 切 view + 应用 filter
  function drillDown(view, query) {
    if (!view) return;
    setView(view);
    // 应用 filter（按 view 分类）
    if (view === 'customers' && query && query.tag) {
      setTimeout(() => {
        const sel = $('#custTag');
        if (sel) { sel.value = query.tag; loadCustomers(); }
      }, 50);
    } else if (view === 'appointments' && query && query.status) {
      setTimeout(() => {
        const sel = $('#apptStatus');
        if (sel) { sel.value = query.status; loadAppointments(); }
      }, 50);
    } else {
      // 触发对应 view 的 loader
      setTimeout(() => {
        if (view === 'handoffs') loadHandoffs();
        else if (view === 'events') loadEvents();
        else if (view === 'leaves') loadLeaves();
        else if (view === 'subscription') loadSubscription();
        else if (view === 'shop') loadShop();
        else if (view === 'appointments') loadAppointments();
        else if (view === 'customers') loadCustomers();
      }, 50);
    }
  }

  // v4.3 周报
  async function loadWeekly() {
    const asOf = $('#weeklyAsOf')?.value || '';
    state.weeklyAsOf = asOf;
    const body = $('#weeklyBody');
    const chainBody = $('#chainWeeklyBody');
    if (body) body.innerHTML = '<div class="card card-pad">' + renderSkeleton(4) + '</div>';
    if (chainBody) chainBody.innerHTML = '<div class="text-muted" style="font-size:12px;">加载中…</div>';
    try {
      let url = '/api/admin/weekly-report';
      if (asOf) url += '?as_of=' + encodeURIComponent(asOf);
      // 拉本周 + 跨店（并行）
      const [r, cr] = await Promise.all([
        api(url),
        api('/api/admin/weekly-report/chain' + (asOf ? '?as_of=' + encodeURIComponent(asOf) : '')),
      ]);
      state.weekly = r;
      state.chainWeekly = cr;
      const ts = $('#weeklyTs'); if (ts) ts.textContent = '最近刷新：' + new Date().toLocaleTimeString();
      if (body) body.innerHTML = renderWeeklyBody(r);
      if (chainBody) chainBody.innerHTML = renderChainWeeklyBody(cr);
    } catch (e) {
      if (body) body.innerHTML = '<div class="card card-pad">' + renderEmpty('加载失败：' + e.message, null, 'x') + '</div>';
    }
  }

  function resetWeekly() {
    state.weeklyAsOf = todayStr();
    if ($('#weeklyAsOf')) $('#weeklyAsOf').value = state.weeklyAsOf;
    loadWeekly();
  }

  // ---------- Actions ----------
  async function doLogin() {
    const u = $('#li_user').value.trim();
    const p = $('#li_pass').value;
    const err = $('#loginErr'), errText = $('#loginErrText');
    err.classList.add('hidden');
    if (!u || !p) { errText.textContent = '请填写用户名和密码'; err.classList.remove('hidden'); return; }
    const btn = $('#loginBtn'), btnText = $('#loginBtnText');
    btn.disabled = true; btnText.textContent = '登录中…';
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      if (!r.ok) {
        const j = await r.json().catch(() => ({}));
        errText.textContent = j.error || '登录失败（HTTP ' + r.status + '）';
        err.classList.remove('hidden');
        return;
      }
      const data = await r.json();
      state.token = data.token;
      state.shopId = data.shop_id;
      localStorage.setItem('jwt_token', state.token);
      localStorage.setItem('shop_id', state.shopId);
      $('#li_pass').value = '';
      // 拉一次 /me 校准 user
      const me = await api('/api/admin/me');
      state.user = me;
      state.shopId = me.shop_id;
      localStorage.setItem('shop_id', state.shopId);
      showApp();
    } catch (e) {
      errText.textContent = '网络错误：' + e.message;
      err.classList.remove('hidden');
    } finally {
      btn.disabled = false; btnText.textContent = '登 录';
    }
  }

  function logout(redirect = true) {
    stopAutoRefresh();
    state.token = ''; state.shopId = ''; state.user = null;
    state.dashboard = null; state.upcoming = []; state.appointments = [];
    state.events = []; state.barbers = []; state.leavesByBarber = {};
    localStorage.removeItem('jwt_token'); localStorage.removeItem('shop_id');
    if (redirect) showLogin();
  }

  function markCompleted(id) {
    openModal('confirm', {
      title: '标记为已完成？',
      message: '该预约会被记录为「已完成」，用于统计完成率。',
      confirmText: '标记完成',
      onConfirm: async () => {
        try {
          await api('/api/admin/appointment/complete', { method: 'POST', body: { appointment_id: id } });
          showToast('已标记为完成', 'success');
          refreshAll(); loadAppointments();
        } catch (e) { showToast('操作失败：' + e.message, 'error'); }
      }
    });
  }
  function markCancelled(id) {
    openModal('confirm', {
      title: '确认取消预约？',
      message: '取消后顾客会收到通知，且不会计入爽约。',
      confirmText: '确认取消',
      onConfirm: async () => {
        try {
          await api('/api/admin/appointment/cancel', { method: 'POST', body: { appointment_id: id, reason: 'admin manual' } });
          showToast('已取消', 'success');
          refreshAll(); loadAppointments();
        } catch (e) { showToast('操作失败：' + e.message, 'error'); }
      }
    });
  }

  function openLeaveModal(barberId, barberName) {
    openModal('leave', { barberId, barberName });
  }

  // v4.4 顾客标签
  function openCustTagModal(customerId, customerName) {
    openModal('custTag', { customerId, customerName });
  }
  async function submitCustTag() {
    const m = state.modal.data;
    const tag = $('#custTagSelect')?.value;
    const errEl = $('#custTagErr');
    if (errEl) errEl.classList.add('hidden');
    if (!tag) { if (errEl) { errEl.textContent = '请选择标签'; errEl.classList.remove('hidden'); } return; }
    try {
      await api('/api/admin/customers/tag', { method: 'POST', body: { customer_id: m.customerId, tag } });
      closeModal();
      showToast('标签已添加', 'success');
      loadCustomers();
    } catch (e) {
      if (errEl) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
    }
  }
  function removeCustTag(customerId, tag) {
    openModal('confirm', {
      title: '移除标签？',
      message: `确认把 "${tag}" 从该顾客身上移除？`,
      confirmText: '移除',
      danger: true,
      onConfirm: async () => {
        try {
          await api('/api/admin/customers/tag', { method: 'DELETE', body: { customer_id: customerId, tag } });
          showToast('标签已移除', 'success');
          loadCustomers();
        } catch (e) { showToast('操作失败：' + e.message, 'error'); }
      }
    });
  }

  // v4.4 服务 CRUD
  function openServiceModal(serviceId) {
    const s = serviceId ? (state.services || []).find(x => x.id === serviceId) : null;
    openModal('service', { service: s });
  }
  async function submitService() {
    const m = state.modal.data;
    const name = $('#svcName').value.trim();
    const min = parseInt($('#svcMin').value, 10);
    const price = $('#svcPrice').value.trim();
    const order = parseInt($('#svcOrder').value, 10) || 0;
    const errEl = $('#svcErr');
    if (errEl) errEl.classList.add('hidden');
    if (!name) { if (errEl) { errEl.textContent = '请填写服务名'; errEl.classList.remove('hidden'); } return; }
    if (!min || min < 1 || min > 480) { if (errEl) { errEl.textContent = '预估时长必须在 1-480 分钟'; errEl.classList.remove('hidden'); } return; }
    try {
      const url = m.service ? `/api/admin/services/${encodeURIComponent(m.service.id)}` : '/api/admin/services';
      const method = m.service ? 'PUT' : 'POST';
      await api(url, { method, body: { name, estimated_min: min, price_range: price, sort_order: order } });
      closeModal();
      showToast(m.service ? '已更新' : '已新增', 'success');
      loadServices();
    } catch (e) {
      if (errEl) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
    }
  }
  function deactivateService(id, name) {
    openModal('confirm', {
      title: '下架服务？',
      message: `「${name}」将下架（不再用于新预约）。历史预约不受影响。`,
      confirmText: '下架',
      danger: true,
      onConfirm: async () => {
        try {
          await api(`/api/admin/services/${encodeURIComponent(id)}`, { method: 'DELETE' });
          showToast('已下架：' + name, 'success');
          loadServices();
        } catch (e) { showToast('操作失败：' + e.message, 'error'); }
      }
    });
  }
  function activateService(id, name) {
    api(`/api/admin/services/${encodeURIComponent(id)}/activate`, { method: 'POST' })
      .then(() => { showToast('已上架：' + name, 'success'); loadServices(); })
      .catch(e => showToast('操作失败：' + e.message, 'error'));
  }

  // v4.4 续费
  function openRenewModal() {
    openModal('renew');
  }
  async function submitRenew() {
    const plan = $('#renewPlan').value;
    const months = parseInt($('#renewMonths').value, 10);
    const amount = parseInt($('#renewAmount').value, 10) || 0;
    const note = $('#renewNote').value.trim();
    const errEl = $('#renewErr');
    if (errEl) errEl.classList.add('hidden');
    if (!months || months < 1 || months > 36) { if (errEl) { errEl.textContent = '月数必须在 1-36'; errEl.classList.remove('hidden'); } return; }
    try {
      await api('/api/admin/subscription/renew', { method: 'POST', body: { plan, months, amount, note } });
      closeModal();
      showToast('续费已记录', 'success');
      loadSubscription();
    } catch (e) {
      if (errEl) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
    }
  }

  // v4.4 店铺设置
  function openShopEditModal() {
    openModal('shopEdit');
  }
  async function submitShopEdit() {
    const body = {};
    const fields = [
      ['shopName', 'name', 'string'],
      ['shopAddress', 'address', 'string'],
      ['shopOpen', 'open_hour', 'int'],
      ['shopClose', 'close_hour', 'int'],
      ['shopLunchStart', 'lunch_start', 'int'],
      ['shopLunchEnd', 'lunch_end', 'int'],
      ['shopLunchEndMin', 'lunch_end_min', 'int'],
      ['shopTimezone', 'timezone', 'string'],
      ['shopHolidays', 'holidays', 'string'],
    ];
    for (const [id, key, kind] of fields) {
      const el = $('#' + id);
      if (!el) continue;
      const v = el.value.trim();
      if (v === '') continue; // skip empty
      if (kind === 'int') body[key] = parseInt(v, 10);
      else body[key] = v;
    }
    const errEl = $('#shopEditErr');
    if (errEl) errEl.classList.add('hidden');
    try {
      await api('/api/admin/shop', { method: 'PUT', body });
      closeModal();
      showToast('店铺信息已更新', 'success');
      loadShop();
    } catch (e) {
      if (errEl) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
    }
  }

  async function submitNewBarber() {
    const name = $('#newBarberName').value.trim();
    const skills = $('#newBarberSkills').value.trim();
    const errEl = $('#newBarberErr');
    errEl.classList.add('hidden');
    if (!name) { errEl.textContent = '请填写姓名'; errEl.classList.remove('hidden'); return; }
    try {
      await api('/api/admin/barbers', { method: 'POST', body: { name, skills } });
      closeModal();
      showToast('已新增：' + name, 'success');
      loadBarbers();
    } catch (e) {
      errEl.textContent = e.message; errEl.classList.remove('hidden');
    }
  }

  function deleteBarber(id, name) {
    openModal('confirm', {
      title: '停用理发师？',
      message: `「${name}」将被停用。如有未来预约会被拒绝，请先取消或请假。`,
      confirmText: '停用',
      danger: true,
      onConfirm: async () => {
        try {
          await api(`/api/admin/barbers/${encodeURIComponent(id)}`, { method: 'DELETE' });
          showToast('已停用：' + name, 'success');
          loadBarbers();
        } catch (e) { showToast('操作失败：' + e.message, 'error'); }
      }
    });
  }
  function activateBarber(id, name) {
    openModal('confirm', {
      title: '恢复理发师？',
      message: `「${name}」将重新可用于预约分配。`,
      confirmText: '恢复',
      onConfirm: async () => {
        try {
          await api(`/api/admin/barbers/${encodeURIComponent(id)}/activate`, { method: 'POST' });
          showToast('已恢复：' + name, 'success');
          loadBarbers();
        } catch (e) { showToast('操作失败：' + e.message, 'error'); }
      }
    });
  }

  async function submitLeave() {
    const m = state.modal.data;
    const startAt = $('#leaveStartAt').value;
    const endAt = $('#leaveEndAt').value;
    const reason = $('#leaveReason').value.trim();
    const action = $('#leaveAction').value;
    const errEl = $('#leaveErr');
    errEl.classList.add('hidden');
    if (!startAt || !endAt) { errEl.textContent = '请填写开始 / 结束时间'; errEl.classList.remove('hidden'); return; }
    if (new Date(startAt) >= new Date(endAt)) {
      errEl.textContent = '开始时间必须早于结束时间'; errEl.classList.remove('hidden'); return;
    }
    try {
      const r = await api(`/api/admin/barber/${encodeURIComponent(m.barberId)}/leave`, {
        method: 'POST',
        body: { start_at: new Date(startAt).toISOString(), end_at: new Date(endAt).toISOString(), reason, action }
      });
      closeModal();
      showToast(`请假已创建：影响 ${r.affected_count} 单（改派 ${r.rescheduled_count} · 取消 ${r.cancelled_count} · 通知 ${r.notified_count}）`, 'success');
      loadLeaves();
      loadLeavesBadge();
    } catch (e) {
      errEl.textContent = e.message; errEl.classList.remove('hidden');
    }
  }

  async function submitChangePassword() {
    const old = $('#oldPwd').value;
    const n1 = $('#newPwd').value;
    const n2 = $('#newPwd2').value;
    const errEl = $('#pwdErr');
    errEl.classList.add('hidden');
    if (!old || !n1 || !n2) { errEl.textContent = '请填写完整'; errEl.classList.remove('hidden'); return; }
    if (n1 !== n2) { errEl.textContent = '两次新密码不一致'; errEl.classList.remove('hidden'); return; }
    if (n1.length < 6) { errEl.textContent = '新密码至少 6 位'; errEl.classList.remove('hidden'); return; }
    try {
      await api('/api/admin/change-password', { method: 'POST', body: { old_password: old, new_password: n1 } });
      closeModal();
      showToast('密码已修改，请用新密码重新登录', 'success');
      setTimeout(() => logout(), 1200);
    } catch (e) {
      errEl.textContent = e.message; errEl.classList.remove('hidden');
    }
  }

  function refreshCurrent() {
    if (state.view === 'dashboard') refreshAll();
    else if (state.view === 'appointments') loadAppointments();
    else if (state.view === 'barbers') loadBarbers();
    else if (state.view === 'leaves') loadLeaves();
    else if (state.view === 'events') loadEvents();
    else if (state.view === 'chain') loadChain();
    else if (state.view === 'handoffs') loadHandoffs();
    else if (state.view === 'customers') loadCustomers();
    else if (state.view === 'services') loadServices();
    else if (state.view === 'subscription') loadSubscription();
    else if (state.view === 'shop') loadShop();
    else if (state.view === 'weekly') loadWeekly();
  }

  // ---------- Init ----------
  function init() {
    // nav clicks
    $$('.nav-item').forEach(n => n.addEventListener('click', e => {
      e.preventDefault();
      const v = n.dataset.view;
      if (!v) return;
      setView(v);
      if (v === 'appointments') loadAppointments();
      else if (v === 'barbers') loadBarbers();
      else if (v === 'leaves') loadLeaves();
      else if (v === 'events') loadEvents();
      else if (v === 'chain') loadChain();
      else if (v === 'handoffs') loadHandoffs();
      else if (v === 'customers') loadCustomers();
      else if (v === 'services') loadServices();
      else if (v === 'subscription') loadSubscription();
      else if (v === 'shop') loadShop();
      else if (v === 'weekly') loadWeekly();
    }));
    // 顾客搜索回车支持（v4.4 轻打磨）
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && state.view === 'customers') {
        if ($('#custQuery') && document.activeElement === $('#custQuery')) {
          loadCustomers();
        }
      }
    });
    // initial load
    bootstrap();
  }

  // expose public API
  return {
    init, doLogin, logout,
    openModal, closeModal,
    openLeaveModal,
    openCustTagModal, openServiceModal, openRenewModal, openShopEditModal,
    submitNewBarber, submitLeave, submitChangePassword,
    submitCustTag, removeCustTag,
    submitService, deactivateService, activateService,
    submitRenew, submitShopEdit,
    deleteBarber, activateBarber,
    markCompleted, markCancelled,
    loadAppointments, resetApptFilters, loadEvents, loadBarbers, loadLeaves, loadChain,
    loadHandoffs, loadCustomers, loadServices, loadSubscription, loadShop,
    loadWeekly, resetWeekly, loadAlerts, drillDown,
    resetCustFilters,
    refreshCurrent,
  };
})();

document.addEventListener('DOMContentLoaded', App.init);
</script>

</body>
</html>
