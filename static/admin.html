<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美发预约助手 · 商户后台</title>
  <!-- Display font: Bricolage Grotesque（英 / 个性）+ 思源黑体（中 / 稳重）
       国内用户: 走 fonts.font.im 镜像（Google Fonts 1:1 代理,API 完全兼容,字体重写到 gstatic.font.im）
       镜像挂了兜底 loli.net；最后兜底系统字体。 -->
  <link rel="preconnect" href="https://fonts.font.im" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.font.im" crossorigin />
  <link href="https://fonts.font.im/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"
        onerror="this.onerror=null;this.href='https://fonts.loli.net/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap';" />
  <style>
    /* ============================================================
       Design tokens — warm salon palette + v4.6 polish
       ============================================================ */
    :root {
      --canvas: #faf9f5;
      --canvas-warm: #f5f1e8;
      --surface: #ffffff;
      --surface-2: #f5f3eb;
      --surface-3: #ebe7d8;
      --line: #e8e6dc;
      --line-strong: #d4d0c0;
      --ink: #1c1917;
      --ink-2: #44403c;
      --ink-muted: #78716c;
      --ink-subtle: #a8a29e;
      --brand: #c26044;
      --brand-hover: #a8512f;
      --brand-soft: #faece2;
      --brand-tint: #fef4ed;
      --olive: #788c5d;
      --olive-soft: #eef0e4;
      --teal: #0f766e;
      --teal-soft: #e0f2ef;
      --amber: #d97706;
      --amber-soft: #fef3c7;
      --red: #dc2626;
      --red-soft: #fee2e2;
      --rose: #f43f5e;
      --rose-soft: #ffe4e6;

      --shadow-xs: 0 1px 2px rgba(28, 25, 23, 0.04);
      --shadow-sm: 0 2px 4px rgba(28, 25, 23, 0.04), 0 1px 2px rgba(28, 25, 23, 0.03);
      --shadow-md: 0 4px 12px rgba(28, 25, 23, 0.06), 0 2px 4px rgba(28, 25, 23, 0.04);
      --shadow-lg: 0 12px 32px rgba(28, 25, 23, 0.10), 0 4px 8px rgba(28, 25, 23, 0.04);
      --shadow-xl: 0 24px 64px rgba(28, 25, 23, 0.14), 0 8px 16px rgba(28, 25, 23, 0.06);

      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;

      --font-sans: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-display: "Bricolage Grotesque", "Noto Sans SC", -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", Menlo, Monaco, Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--canvas);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      min-height: 100vh;
    }
    /* 全局暖色渐变背景 + 噪点纹理（v4.6 视觉升级） */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(194, 96, 68, 0.06), transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(120, 140, 93, 0.05), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: multiply;
    }
    .app, .login-wrap, #loginView, #appView { position: relative; z-index: 1; }
    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; }
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* 可访问性：键盘焦点环（v4.6） */
    :focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 2px;
      border-radius: 4px;
    }
    .btn:focus-visible,
    .icon-btn:focus-visible {
      outline-offset: 3px;
    }

    /* Staggered 入场动画（v4.6） */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .stagger > * { animation: fadeUp 0.4s ease-out backwards; }
    .stagger > *:nth-child(1) { animation-delay: 0.02s; }
    .stagger > *:nth-child(2) { animation-delay: 0.06s; }
    .stagger > *:nth-child(3) { animation-delay: 0.10s; }
    .stagger > *:nth-child(4) { animation-delay: 0.14s; }
    .stagger > *:nth-child(5) { animation-delay: 0.18s; }
    .stagger > *:nth-child(6) { animation-delay: 0.22s; }
    .stagger > *:nth-child(7) { animation-delay: 0.26s; }
    .stagger > *:nth-child(8) { animation-delay: 0.30s; }

    /* ============================================================
       Utility classes
       ============================================================ */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      font-size: 13px; font-weight: 500;
      transition: all .15s ease;
      box-shadow: var(--shadow-xs);
    }
    .btn:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: var(--brand); color: white; border-color: var(--brand); }
    .btn-primary:hover { background: var(--brand-hover); border-color: var(--brand-hover); }
    .btn-ghost { background: transparent; border-color: transparent; box-shadow: none; }
    .btn-ghost:hover { background: var(--surface-2); }
    .btn-danger { color: var(--red); border-color: var(--line); }
    .btn-danger:hover { background: #fef2f2; border-color: #fecaca; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xs);
    }
    .card-pad { padding: 20px; }
    .card-pad-sm { padding: 14px 18px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--ink-muted); font-weight: 500; }
    .input, .select, .textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      font-size: 13px;
      transition: border-color .15s, box-shadow .15s;
    }
    .input:focus, .select:focus, .textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(194, 96, 68, 0.12);
    }
    .textarea { min-height: 80px; resize: vertical; font-family: inherit; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px; font-weight: 500;
      background: var(--surface-2);
      color: var(--ink-2);
      white-space: nowrap;
    }
    .badge::before {
      content: ''; display: inline-block;
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; opacity: .55;
    }
    .badge::before { display: none; } /* strip the dot, cleaner */
    .badge-active { background: #ecfdf5; color: #047857; }
    .badge-completed { background: #f0fdf4; color: #166534; }
    .badge-noshow { background: #fef2f2; color: var(--red); }
    .badge-cancelled { background: var(--surface-2); color: var(--ink-muted); }
    .badge-warning { background: #fffbeb; color: var(--amber); }
    .badge-info { background: #f0fdfa; color: var(--teal); }

    /* v4.10.1 通知中心专用样式 */
    .notif-table .row-failed {
      background: rgba(254, 226, 226, 0.4);
    }
    .notif-table .row-failed:hover {
      background: rgba(254, 226, 226, 0.7);
    }
    .btn-warning {
      background: var(--amber);
      color: #fff;
      border-color: var(--amber);
    }
    .btn-warning:hover:not(:disabled) {
      background: #b45309;
      border-color: #b45309;
    }
    .btn-warning:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      font-size: 13px;
    }
    .table thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink-muted);
      background: var(--surface-2);
      border-bottom: 1px solid var(--line);
    }
    .table tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--ink-2);
    }
    .table tbody tr:last-child td { border-bottom: 0; }
    .table tbody tr { transition: background .12s; }
    .table tbody tr:hover { background: #fafaf5; }
    .table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .table .mono { font-family: var(--font-mono); font-size: 12px; }

    /* ============================================================
       Layout
       ============================================================ */
    .app {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100dvh;
    }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--line);
      display: flex; flex-direction: column;
      position: sticky; top: 0;
      height: 100dvh;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--line);
    }
    .brand-mark {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-hover) 100%);
      display: grid; place-items: center;
      color: white;
      box-shadow: var(--shadow-sm);
    }
    .brand-mark svg { width: 18px; height: 18px; }
    .brand-text { display: flex; flex-direction: column; line-height: 1.2; }
    .brand-text .t1 { font-size: 14px; font-weight: 600; color: var(--ink); }
    .brand-text .t2 { font-size: 11px; color: var(--ink-muted); }

    .nav { padding: 12px 8px; flex: 1; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius);
      color: var(--ink-2);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all .12s;
      user-select: none;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--ink); }
    .nav-item.active { background: var(--brand-soft); color: var(--brand); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-item .badge { margin-left: auto; padding: 0 6px; font-size: 10px; min-width: 18px; text-align: center; }

    .sidebar-foot {
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
    }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--surface-2);
      color: var(--ink-2);
      display: grid; place-items: center;
      font-size: 13px; font-weight: 600;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-info .name { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-info .role { font-size: 11px; color: var(--ink-muted); }
    .icon-btn {
      width: 28px; height: 28px;
      border: 0; background: transparent;
      border-radius: 6px;
      color: var(--ink-muted);
      display: grid; place-items: center;
      transition: all .12s;
    }
    .icon-btn:hover { background: var(--surface-2); color: var(--ink); }

    .main { display: flex; flex-direction: column; min-width: 0; }

    .topbar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 16px;
      padding: 14px 24px;
      background: rgba(250, 249, 245, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-muted); }
    .crumbs .sep { color: var(--ink-subtle); }
    .crumbs .current { color: var(--ink); font-weight: 500; }
    .topbar .spacer { flex: 1; }
    .live-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 11px; color: var(--ink-muted);
    }
    .live-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--olive);
      animation: breathe 2.4s ease-in-out infinite;
    }
    @keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    .content { padding: 24px; flex: 1; }
    .view-head { margin-bottom: 20px; }
    .view-head h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--ink);
    }
    .view-head p { margin: 6px 0 0; color: var(--ink-muted); font-size: 13px; }
    /* 让 hero 数字也用 display 字体，强化"实时"感 */
    .kpi .value {
      font-family: var(--font-display);
      font-feature-settings: "tnum" 1;
    }
    .view-head .crumbs-inline { display: flex; align-items: center; gap: 6px; color: var(--ink-subtle); font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ============================================================
       KPI grid
       ============================================================ */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow-xs);
      transition: all .15s;
    }
    .kpi:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .kpi .label { font-size: 12px; color: var(--ink-muted); font-weight: 500; }
    .kpi .value { margin-top: 4px; font-size: 28px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; font-variant-numeric: tabular-nums; }
    .kpi .sub { margin-top: 6px; font-size: 12px; color: var(--ink-muted); }
    .kpi.alert { border-color: rgba(220, 38, 38, 0.2); background: linear-gradient(180deg, #fffaf9 0%, var(--surface) 60%); }
    .kpi.success { border-color: rgba(120, 140, 93, 0.25); }

    .section { margin-top: 24px; }
    .section-head {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 12px;
    }
    .section-head h2 { margin: 0; font-size: 14px; font-weight: 600; color: var(--ink); }
    .section-head .sub { font-size: 12px; color: var(--ink-muted); }
    .section-head .spacer { flex: 1; }

    /* ============================================================
       Bar chart (top hours / barbers)
       ============================================================ */
    .bar-list { display: flex; flex-direction: column; gap: 8px; padding: 4px 0; }
    .bar-row {
      display: grid; grid-template-columns: 90px 1fr 50px;
      align-items: center; gap: 12px;
      font-size: 13px;
    }
    .bar-row .name { color: var(--ink-2); font-weight: 500; }
    .bar-row .bar {
      height: 8px; background: var(--surface-2); border-radius: 999px; overflow: hidden;
    }
    .bar-row .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand) 0%, #e89175 100%);
      border-radius: 999px;
      transition: width .4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .bar-row .num { text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-muted); }

    /* ============================================================
       Upcoming list
       ============================================================ */
    .upcoming-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }
    .upcoming-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      transition: all .15s;
    }
    .upcoming-card:hover { box-shadow: var(--shadow-sm); border-color: var(--line-strong); }
    .upcoming-card.urgent {
      border-color: rgba(220, 38, 38, 0.25);
      background: linear-gradient(135deg, #fff8f6 0%, var(--surface) 50%);
    }
    .upcoming-card.soon {
      border-color: rgba(217, 119, 6, 0.25);
      background: linear-gradient(135deg, #fffaf0 0%, var(--surface) 50%);
    }
    .upcoming-card .time-block {
      flex-shrink: 0;
      text-align: center;
      padding: 4px 10px;
      background: var(--surface-2);
      border-radius: 8px;
    }
    .upcoming-card.urgent .time-block { background: #fee2e2; color: var(--red); }
    .upcoming-card.soon .time-block { background: #fef3c7; color: var(--amber); }
    .upcoming-card .time-block .t { font-size: 18px; font-weight: 600; line-height: 1; }
    .upcoming-card .time-block .m { font-size: 10px; color: inherit; opacity: 0.7; margin-top: 2px; }
    .upcoming-card .body { flex: 1; min-width: 0; }
    .upcoming-card .body .name { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .upcoming-card .body .meta { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
    .upcoming-card .dist { font-size: 12px; color: var(--ink-muted); white-space: nowrap; }

    /* ============================================================
       Modals
       ============================================================ */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(28, 25, 23, 0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: grid; place-items: center;
      padding: 20px;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      width: 100%; max-width: 440px;
      box-shadow: var(--shadow-lg);
      animation: scaleIn .18s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .modal.lg { max-width: 560px; }
    @keyframes scaleIn {
      from { transform: scale(0.96); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-head {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
    }
    .modal-head h2 { margin: 0; font-size: 15px; font-weight: 600; }
    .modal-head .spacer { flex: 1; }
    .modal-body { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
    .modal-foot {
      padding: 14px 22px;
      border-top: 1px solid var(--line);
      display: flex; justify-content: flex-end; gap: 8px;
      background: var(--canvas);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }

    /* ============================================================
       Login
       ============================================================ */
    .login-page {
      min-height: 100dvh;
      display: grid;
      grid-template-columns: 1fr;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 20% 0%, rgba(194, 96, 68, 0.06) 0%, transparent 40%),
        radial-gradient(circle at 80% 100%, rgba(120, 140, 93, 0.06) 0%, transparent 40%),
        var(--canvas);
    }
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 32px;
      box-shadow: var(--shadow-md);
    }
    .login-card .brand {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      margin-bottom: 24px;
    }
    .login-card .brand .mark {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-hover) 100%);
      display: grid; place-items: center;
      color: white;
      box-shadow: var(--shadow-md);
    }
    .login-card .brand .mark svg { width: 26px; height: 26px; }
    .login-card h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .login-card .sub { font-size: 12px; color: var(--ink-muted); }

    .err-banner {
      padding: 10px 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--red);
      border-radius: var(--radius);
      font-size: 12px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ============================================================
       Empty / loading
       ============================================================ */
    .empty {
      padding: 36px 20px;
      text-align: center;
      color: var(--ink-muted);
    }
    .empty .icon { width: 40px; height: 40px; margin: 0 auto 12px; color: var(--ink-subtle); }
    .empty .title { font-size: 13px; font-weight: 500; color: var(--ink-2); }
    .empty .hint { font-size: 12px; margin-top: 4px; }

    .skel {
      background: linear-gradient(90deg, var(--surface-2) 0%, #ede9dc 50%, var(--surface-2) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ============================================================
       Filter bar
       ============================================================ */
    .filterbar {
      display: flex; align-items: flex-end; gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .filterbar .field { min-width: 140px; }

    /* ============================================================
       Responsive
       ============================================================ */
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        flex-direction: row;
        align-items: center;
        padding: 0;
        overflow-x: auto;
      }
      .sidebar-brand { border-bottom: 0; border-right: 1px solid var(--line); padding: 12px 16px; flex-shrink: 0; }
      .nav { display: flex; padding: 8px; gap: 4px; flex: 1; overflow-x: auto; }
      .nav-item { white-space: nowrap; padding: 7px 10px; font-size: 12px; }
      .nav-item .badge { display: none; }
      .sidebar-foot { display: none; }
      .content { padding: 16px; }
      .view-head h1 { font-size: 18px; }
      .kpi .value { font-size: 24px; }
      .topbar { padding: 10px 16px; }
      .crumbs { font-size: 12px; }
      .live-pill { display: none !important; }
    }
    @media (max-width: 520px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .kpi { padding: 14px; }
      .kpi .value { font-size: 20px; }
      .form-grid { grid-template-columns: 1fr; }
      .modal { max-width: 100vw; max-height: 100dvh; border-radius: 0; }
      .modal.lg { max-width: 100vw; }
      .table { font-size: 12px; }
      .table thead th, .table tbody td { padding: 8px 10px; }
    }

    /* Scrollbar — make it warm */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 10px; border: 2px solid var(--canvas); }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-subtle); }

    .hidden { display: none !important; }
    .row { display: flex; align-items: center; gap: 8px; }
    .grow { flex: 1; }
    .text-muted { color: var(--ink-muted); }
    .text-subtle { color: var(--ink-subtle); }
    .text-mono { font-family: var(--font-mono); font-size: 12px; }
    .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }

    /* ============================================================
       v4.6 新增组件样式
       ============================================================ */

    /* Segmented control（时间窗口 / tab 切换） */
    .seg {
      display: inline-flex;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
    }
    .seg button {
      border: 0;
      background: transparent;
      color: var(--ink-muted);
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 999px;
      cursor: pointer;
      transition: all .15s;
    }
    .seg button:hover { color: var(--ink); }
    .seg button.active {
      background: var(--surface);
      color: var(--brand);
      box-shadow: var(--shadow-xs);
      font-weight: 600;
    }

    /* Handoff card（v4.6 加「已处理」按钮 + 折叠 meta） */
    .handoff-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 12px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      box-shadow: var(--shadow-xs);
      transition: all .15s;
    }
    .handoff-card:hover { box-shadow: var(--shadow-sm); border-color: var(--line-strong); }
    .handoff-card.resolved {
      background: var(--olive-soft);
      border-color: rgba(120, 140, 93, 0.3);
      opacity: 0.78;
    }
    .handoff-card .reason { font-weight: 500; color: var(--ink); }
    .handoff-card .meta { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }
    .handoff-card .ts { font-size: 12px; color: var(--ink-muted); font-family: var(--font-mono); white-space: nowrap; }
    .handoff-card .msg {
      grid-column: 1 / -1;
      margin-top: 8px;
      padding: 10px 12px;
      background: var(--surface-2);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--ink-2);
      font-style: italic;
    }
    .handoff-card .actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }
    .handoff-card .resolved-mark {
      font-size: 12px;
      color: var(--olive);
      font-weight: 600;
    }

    /* Customer detail modal 内容 */
    .cust-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 24px;
      margin: 4px 0 16px;
    }
    .cust-detail-grid .k { color: var(--ink-muted); font-size: 12px; }
    .cust-detail-grid .v { color: var(--ink); font-size: 13px; word-break: break-all; }
    .cust-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 12px 0 16px;
    }
    .cust-stat {
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 10px;
      text-align: center;
    }
    .cust-stat .n {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.1;
    }
    .cust-stat .l { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
    .cust-stat.alert .n { color: var(--red); }
    .cust-stat.warn .n { color: var(--amber); }
    .cust-stat.good .n { color: var(--olive); }

    .appt-mini {
      display: grid;
      grid-template-columns: 78px 80px 1fr 70px;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .appt-mini:last-child { border-bottom: 0; }
    .appt-mini .when { font-family: var(--font-mono); font-size: 12px; }
    .appt-mini .when .date { color: var(--ink); font-weight: 500; }
    .appt-mini .when .time { color: var(--ink-muted); }
    .appt-mini .barber { color: var(--ink-2); }
    .appt-mini .service { color: var(--ink-muted); font-size: 12px; }

    /* CSV upload area */
    .upload-area {
      border: 2px dashed var(--line-strong);
      border-radius: var(--radius-lg);
      padding: 32px 20px;
      text-align: center;
      background: var(--surface-2);
      transition: all .15s;
      cursor: pointer;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--brand);
      background: var(--brand-tint);
    }
    .upload-area .hint { font-size: 12px; color: var(--ink-muted); margin-top: 8px; }
    .upload-area .icon-big { color: var(--brand); }

    .import-report {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 13px;
    }
    .import-report.ok { background: var(--olive-soft); color: #3f5530; }
    .import-report.partial { background: var(--amber-soft); color: #92590a; }
    .import-report.fail { background: var(--red-soft); color: #b91c1c; }
    .import-report ul { margin: 6px 0 0 18px; padding: 0; }

    /* Chain Top 5 medal */
    .top-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .top-row {
      display: grid;
      grid-template-columns: 32px 1fr 80px 60px;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius);
      transition: background .12s;
    }
    .top-row:hover { background: var(--surface-2); }
    .top-row .rank {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      color: var(--ink-subtle);
      text-align: center;
    }
    .top-row.gold .rank { color: #b58900; }
    .top-row.silver .rank { color: #6b7280; }
    .top-row.bronze .rank { color: #92400e; }
    .top-row .name { font-weight: 500; }
    .top-row .bar { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
    .top-row .bar .fill { height: 100%; background: var(--brand); }
    .top-row .num {
      text-align: right;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
    }

    /* 链看板窗口徽章 */
    .window-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 10px;
      background: var(--brand-soft);
      color: var(--brand);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* 标签 chip 加强（v4.6 让 FREQUENT / NEW 也有颜色） */
    .tag-frequent { background: var(--teal-soft); color: var(--teal); }
    .tag-new { background: var(--brand-soft); color: var(--brand); }
    .tag-vip { background: #fef3c7; color: #b58900; }
    .tag-blacklist { background: var(--red-soft); color: var(--red); }

    /* 链接样式（顾客行可点击） */
    .clickable { cursor: pointer; transition: color .12s; }
    .clickable:hover { color: var(--brand); text-decoration: underline; }

    /* 让长内容容器带细滚动条 */
    .scroll-y { overflow-y: auto; }
    .max-h-400 { max-height: 400px; }
    .max-h-300 { max-height: 300px; }

    /* ============================================================
       v4.4 新增：表单 / 标签 / handoff / service / plan pill
       ============================================================ */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .kv-list {
      display: grid;
      grid-template-columns: 140px 1fr;
      row-gap: 10px;
      column-gap: 16px;
      font-size: 13px;
    }
    .kv-list .k { color: var(--ink-muted); }
    .kv-list .v { color: var(--ink); }
    .kv-list .v.mono { font-family: var(--font-mono); }

    .tag-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px; font-weight: 500;
      background: var(--surface-2);
      color: var(--ink-2);
      border: 1px solid var(--line);
      line-height: 1.5;
    }
    .tag-chip.tag-vip { background: #fef3c7; color: #b45309; border-color: #fcd34d; }
    .tag-chip.tag-frequent { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
    .tag-chip.tag-blacklist { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .tag-chip.tag-new { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .tag-chip.removable { cursor: pointer; }
    .tag-chip.removable:hover { background: #fafaf5; }
    .tag-chip .x { color: var(--ink-muted); font-weight: 600; }

    .handoff-list { display: flex; flex-direction: column; gap: 10px; }
    .handoff-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 3px solid var(--amber);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 16px;
      align-items: start;
    }
    .handoff-card .reason { font-weight: 500; color: var(--ink); }
    .handoff-card .meta { font-size: 12px; color: var(--ink-muted); }
    .handoff-card .ts { font-family: var(--font-mono); font-size: 11px; color: var(--ink-subtle); }
    .handoff-card .msg {
      grid-column: 1 / -1;
      margin-top: 6px;
      padding: 8px 10px;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--ink-2);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .plan-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px; font-weight: 600;
      background: var(--brand-soft);
      color: var(--brand);
    }
    .plan-pill.plan-pro { background: #eff6ff; color: #1d4ed8; }
    .plan-pill.plan-flagship { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; }
    .plan-pill.plan-expired { background: #fef2f2; color: var(--red); }

.service-row {
      display: grid;
      grid-template-columns: 1fr 130px 90px 100px 110px;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .service-row:last-child { border-bottom: 0; }
    .service-row.inactive { opacity: 0.5; }
    .service-row .name { font-weight: 500; color: var(--ink); }
    .service-row .price { color: var(--ink-muted); font-family: var(--font-mono); font-size: 12px; }
    .service-row .shop-cell {
      color: var(--ink-muted);
      font-size: 12px;
      font-family: var(--font-mono);
    }
    .service-row .shop-cell .shop-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--olive-soft);
      color: var(--olive);
      font-size: 11px;
    }
    /* v4.9 跨店展示：商户分组标题 */
    .service-shop-head {
      padding: 10px 14px;
      background: var(--surface-2);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .service-shop-head .shop-count {
      margin-left: auto;
      color: var(--ink-faint);
      font-weight: 400;
      font-family: var(--font-mono);
    }
    /* v4.9 跨店展示：商户分组标题 */
    .service-shop-head {
      padding: 8px 14px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .service-shop-head .shop-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--olive-soft);
      color: var(--olive);
      font-size: 11px;
      font-family: var(--font-mono);
    }
    .service-shop-head .shop-count {
      margin-left: auto;
      color: var(--ink-faint);
      font-weight: 400;
    }

    /* v4.4 轻打磨：empty + skel 更柔和 */
    .empty {
      padding: 48px 20px;
      text-align: center;
      color: var(--ink-muted);
    }
    .empty .icon { width: 40px; height: 40px; margin: 0 auto 12px; color: var(--ink-subtle); opacity: 0.7; }
    .empty .title { font-size: 14px; font-weight: 500; color: var(--ink-2); margin-top: 8px; }
    .empty .hint { font-size: 12px; margin-top: 4px; color: var(--ink-muted); }

    /* v4.4 轻打磨：filter bar 在小屏不折行 */
    .filterbar .field { min-width: 120px; }

    /* ============================================================
       v4.5 告警 banner
       ============================================================ */
    .alerts-banner {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .alert-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 3px solid var(--ink-muted);
      border-radius: var(--radius);
      padding: 10px 16px;
      transition: all .15s;
    }
    .alert-item.alert-info { border-left-color: var(--ink-muted); background: var(--surface); }
    .alert-item.alert-warning { border-left-color: #d97706; background: #fffbeb; }
    .alert-item.alert-critical {
      border-left-color: var(--red);
      background: #fef2f2;
      animation: alertPulse 2s ease-in-out infinite;
    }
    @keyframes alertPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
      50% { box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.08); }
    }
    .alert-item:hover { box-shadow: var(--shadow-sm); transform: translateX(2px); }
    .alert-title { font-size: 13px; font-weight: 600; color: var(--ink); }
    .alert-desc { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }
    .alert-action { font-size: 11px; color: var(--brand); margin-top: 4px; }
    /* v4.11 成员管理列表（参考 service-row 风格） */
    .member-row {
      display: grid;
      grid-template-columns: 1fr 90px 90px 170px 290px;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .member-row:last-child { border-bottom: 0; }
    .member-row.inactive { opacity: 0.55; }
    .member-row .name { font-weight: 500; color: var(--ink); }
    .member-row .num { display: flex; gap: 4px; justify-content: flex-end; flex-wrap: wrap; }
    .role-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }
    .role-pill-owner { background: rgba(217, 119, 6, 0.12); color: #b45309; }
    .role-pill-staff { background: var(--olive-soft); color: var(--olive); }
    .role-pill-platform { background: rgba(99, 102, 241, 0.12); color: #4338ca; }
    .status-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }
    .status-pill-active { background: var(--olive-soft); color: var(--olive); }
    .status-pill-disabled { background: var(--surface-2); color: var(--ink-muted); }
  </style>
</head>
<body>

<!-- ============================================================
     LOGIN SCREEN
     ============================================================ -->
<div id="loginView" class="login-page">
  <form class="login-card" onsubmit="event.preventDefault(); App.doLogin();">
    <div class="brand">
      <div class="mark">
        <!-- scissor icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/>
          <line x1="20" y1="4" x2="8.12" y2="15.88"/>
          <line x1="14.47" y1="14.48" x2="20" y2="20"/>
          <line x1="8.12" y1="8.12" x2="12" y2="12"/>
        </svg>
      </div>
      <h1>商户后台</h1>
      <span class="sub">登录查看今日预约、爽约率与续费漏斗</span>
    </div>

    <div class="field" style="margin-bottom: 12px;">
      <label for="li_user">用户名</label>
      <input id="li_user" class="input" type="text" autocomplete="username" placeholder="admin" required />
    </div>
    <div class="field" style="margin-bottom: 16px;">
      <label for="li_pass">密码</label>
      <input id="li_pass" class="input" type="password" autocomplete="current-password" placeholder="••••••" required />
    </div>

    <div id="loginErr" class="err-banner hidden" style="margin-bottom: 12px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="loginErrText"></span>
    </div>

    <button class="btn btn-primary" type="submit" id="loginBtn" style="width: 100%; justify-content: center;">
      <span id="loginBtnText">登 录</span>
    </button>

    <p class="text-subtle" style="font-size: 11px; text-align: center; margin: 16px 0 0;">
      首次部署默认账号 <code>admin / admin123</code>，登录后请立即改密
    </p>
  </form>
</div>

<!-- ============================================================
     MAIN APP
     ============================================================ -->
<div id="appView" class="app hidden">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/>
          <line x1="20" y1="4" x2="8.12" y2="15.88"/>
          <line x1="14.47" y1="14.48" x2="20" y2="20"/>
          <line x1="8.12" y1="8.12" x2="12" y2="12"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="t1">美发预约助手</span>
        <span class="t2">商户工作台</span>
      </div>
    </div>

    <nav class="nav" id="navList">
      <a class="nav-item" data-view="dashboard" href="#dashboard">

<script>
/* ================================================================
   App state + API client + views
   ================================================================ */
const App = (() => {
  // ---------- State ----------
  const state = {
    token: localStorage.getItem('jwt_token') || '',
    shopId: localStorage.getItem('shop_id') || '',
    user: null,            // { admin_id, shop_id, role, shop }
    view: 'dashboard',
    loading: false,

    // Data caches
    dashboard: null,
    upcoming: [],
    appointments: [],
    events: [],
    barbers: [],
    leaves: [],
    leavesByBarber: {},
    notifications: [],     // v4.10.1 通知中心列表
    notifFilter: { status: '', type: '', leave_id: '' },
    chainData: null,
    shop: null,           // v4.4 店铺信息
    handoffs: [],         // v4.4 转人工列表
    handoffsResolved: {}, // v4.6 { [handoffID]: { resolved_at, resolved_by, note } }，按 handoff ID 缓存
    showResolvedHandoffs: false, // v4.6 是否显示已处理的转人工
    customers: [],        // v4.4 顾客列表
    customerDetail: null, // v4.6 当前查看的顾客详情
    customerDetailLoading: false, // v4.6
    services: [],         // v4.4 服务目录
    subscription: [],     // v4.4 订阅历史
    weekly: null,         // v4.4 周报（单店）
    chainWeekly: null,    // v4.4 周报（跨店）
    alerts: null,         // v4.5 dashboard 告警（B3）

    // Chain view 时间窗口（v4.6 PRD §11.10.8）
    chainWindow: 'month', // today | week | month

    // Filters
    apptDate: todayStr(),
    apptStatus: '',
    eventType: '',

    // Modals
    modal: null,           // { kind, data? }
  };

  // ---------- API client ----------
  async function api(path, opts = {}) {
    const headers = { 'Accept': 'application/json' };
    if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
    if (opts.body && typeof opts.body !== 'string') {
      headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(opts.body);
    }
    const r = await fetch(path, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
    if (r.status === 401) {
      logout();
      throw new Error('登录已过期');
    }
    if (!r.ok) {
      const t = await r.text().catch(() => '');
      try { const j = JSON.parse(t); throw new Error(j.error || ('HTTP ' + r.status)); }
      catch (e) { if (e instanceof Error) throw e; throw new Error('HTTP ' + r.status + ': ' + t.slice(0, 100)); }
    }
    if (r.status === 204) return null;
    return await r.json();
  }

  // ---------- Helpers ----------
  function $(s, root = document) { return root.querySelector(s); }
  function $$(s, root = document) { return Array.from(root.querySelectorAll(s)); }
  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }
  function todayStr() {
    const d = new Date();
    const p = n => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
  }
  function toLocalInput(d) {
    const p = n => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate())
      + 'T' + p(d.getHours()) + ':' + p(d.getMinutes());
  }
  function fmtPct(x) { return (x * 100).toFixed(1) + '%'; }
  function fmtDate(s) { return s ? esc(s) : '—'; }
  function fmtTime(s) { return s ? esc(s.slice(0, 5)) : '—'; }
  function fmtRelative(min) {
    if (min < 0) return '已超时';
    if (min < 60) return min + ' 分钟后';
    const h = Math.floor(min / 60), m = min % 60;
    return h + ' 小时' + (m > 0 ? ' ' + m + ' 分' : '');
  }
  function showToast(msg, kind = 'info') {
    // minimal toast (top-right pill, auto-dismiss)
    let host = document.getElementById('toastHost');
    if (!host) {
      host = document.createElement('div');
      host.id = 'toastHost';
      host.style.cssText = 'position:fixed;top:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:8px;pointer-events:none;';
      document.body.appendChild(host);
    }
    const t = document.createElement('div');
    const color = kind === 'error' ? 'var(--red)' : kind === 'success' ? 'var(--olive)' : 'var(--ink)';
    t.style.cssText = `background:var(--surface);border:1px solid var(--line);border-left:3px solid ${color};padding:10px 14px;border-radius:8px;box-shadow:var(--shadow-md);font-size:13px;min-width:240px;max-width:380px;animation:scaleIn .18s ease;pointer-events:auto;`;
    t.textContent = msg;
    host.appendChild(t);
    setTimeout(() => { t.style.transition = 'opacity .2s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 220); }, 2800);
  }

  // ---------- View rendering ----------
  function setView(v) {
    state.view = v;
    $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === v));
    const labels = {
      dashboard: '实时看板', appointments: '预约管理', barbers: '理发师',
      leaves: '请假管理', events: '事件日志', chain: '多店看板',
      handoffs: '转人工', customers: '顾客', services: '服务目录',
      subscription: '订阅', shop: '店铺设置', weekly: '单店周报',
      'chain-weekly': '跨店周报',
      members: '成员管理',
      notifications: '通知中心'
    };
    $('#crumbView').textContent = labels[v] || v;
    render();
  }

  function render() {
    const c = $('#content');
    if (state.view === 'dashboard') c.innerHTML = renderDashboard();
    else if (state.view === 'appointments') c.innerHTML = renderAppointments();
    else if (state.view === 'barbers') c.innerHTML = renderBarbers();
    else if (state.view === 'leaves') c.innerHTML = renderLeaves();
    else if (state.view === 'events') c.innerHTML = renderEvents();
    else if (state.view === 'chain') c.innerHTML = renderChain();
    else if (state.view === 'handoffs') c.innerHTML = renderHandoffs();
    else if (state.view === 'customers') c.innerHTML = renderCustomers();
    else if (state.view === 'services') c.innerHTML = renderServices();
    else if (state.view === 'subscription') c.innerHTML = renderSubscription();
    else if (state.view === 'shop') c.innerHTML = renderShop();
    else if (state.view === 'weekly') c.innerHTML = renderWeekly();
    else if (state.view === 'chain-weekly') c.innerHTML = renderChainWeekly();
    else if (state.view === 'notifications') c.innerHTML = renderNotifications();
    else if (state.view === 'members') c.innerHTML = renderMembers();
  }

  function renderEmpty(title, hint, iconName = 'inbox') {
    return `<div class="empty">
      ${icon(iconName, 40)}
      <div class="title">${esc(title)}</div>
      ${hint ? `<div class="hint">${esc(hint)}</div>` : ''}
    </div>`;
  }

  function renderSkeleton(rows = 4) {
    return Array(rows).fill(0).map(() =>
      '<div class="skel" style="height:36px;margin-bottom:8px;"></div>'
    ).join('');
  }

  // ---------- Dashboard view ----------
  function renderDashboard() {
    const d = state.dashboard;
    if (!d) {
      return `<div class="kpi-grid">${renderSkeleton(4)}</div>
        <div class="card card-pad section">${renderSkeleton(6)}</div>`;
    }
    const today = d.today || {};
    const week = d.week || {};
    const month = d.month || {};
    const handoffN = d.handoff_pending_today || 0;
    const handoffClass = handoffN > 0 ? 'alert' : 'success';

    return `
      <div class="view-head">
        <h1>实时看板</h1>
        <p>今天 · 本周 · 本月经营快照，30 秒自动刷新</p>
      </div>

      ${renderAlertsBanner()}

      <div class="kpi-grid stagger">
        ${kpiCard('今日预约', today.total || 0, 'info', `${today.upcoming || 0} 单将在 2 小时内到店`, 'appointments')}
        ${kpiCard('今日完成率', fmtPct(today.complete_rate || 0), 'success',
          `已完成 ${today.completed || 0} · 爽约 ${today.noshow || 0}`, 'appointments', { status: 'completed' })}
        ${kpiCard('今日爽约率', fmtPct(today.no_show_rate || 0),
          (today.no_show_rate || 0) > 0.15 ? 'alert' : 'normal',
          '每 5 分钟由 cron 自动标记', 'appointments', { status: 'noshow' })}
        ${kpiCard('待人工处理', handoffN, handoffClass,
          handoffN > 0 ? '点击下方"待人工"卡片查看' : '今日无待办', 'handoffs')}
        ${kpiCard('本周预约', week.total || 0, 'normal',
          `完成 ${week.completed || 0} · 取消 ${week.cancelled || 0}`, 'appointments')}
        ${kpiCard('本月预约', month.total || 0, 'normal',
          `完成 ${month.completed || 0} · 爽约 ${month.noshow || 0}`, 'appointments')}
        ${kpiCard('总事件数', d.lifecycle_count || 0, 'normal', '埋点事件累计', 'events')}
      </div>

      <div class="section">
        <div class="section-head">
          <h2>即将到店（接下来 2 小时）</h2>
          <span class="sub" id="upcomingTs"></span>
          <span class="spacer"></span>
        </div>
        <div id="upcomingList">
          ${state.upcoming.length === 0
            ? renderEmpty('接下来 2 小时暂无预约', null, 'calendar')
            : '<div class="upcoming-grid">' + state.upcoming.map(renderUpcomingCard).join('') + '</div>'}
        </div>
      </div>

      <div class="section">
        <div class="card card-pad">
          <div class="section-head">
            <h2>热门时段 TOP 5（近 30 天）</h2>
            <span class="sub">按完成 + 爽约 + 待到店聚合</span>
          </div>
          ${renderBarList((d.top_hours || []).map(r => ({ name: r.hour, count: r.count })))}
        </div>
      </div>

      <div class="section">
        <div class="card card-pad">
          <div class="section-head">
            <h2>热门理发师（近 30 天）</h2>
            <span class="sub">预约量降序</span>
          </div>
          ${renderBarList((d.top_barbers || []).map(r => ({ name: r.barber_name, count: r.count })))}
        </div>
      </div>

      <div class="section">
        <div class="card card-pad">
          <div class="section-head">
            <h2>续费漏斗 · 本月事件分布</h2>
            <span class="sub">top 20</span>
          </div>
          ${renderEventFunnel(d.event_funnel_month || [])}
        </div>
      </div>
    `;
  }

  function kpiCard(label, value, variant = 'normal', sub, linkTo, linkQuery) {
    const cls = variant === 'alert' ? 'alert' : variant === 'success' ? 'success' : '';
    const clickable = linkTo ? `onclick="App.drillDown('${esc(linkTo)}', ${JSON.stringify(linkQuery || {}).replace(/"/g, '&quot;')})" style="cursor:pointer;"` : '';
    const hint = linkTo ? '<span style="opacity:0.5;margin-left:4px;">↗</span>' : '';
    return `<div class="kpi ${cls}" ${clickable}>
      <div class="label">${esc(label)}${hint}</div>
      <div class="value">${esc(value)}</div>
      <div class="sub">${esc(sub || '')}</div>
    </div>`;
  }

  // 告警 banner（dashboard 顶部）
  function renderAlertsBanner() {
    const a = state.alerts;
    if (!a || !a.alerts || a.alerts.length === 0) return '';
    const items = a.alerts.map(al => {
      const sev = al.severity || 'info';
      const action = al.action || {};
      const click = action.view
        ? `onclick="App.drillDown('${esc(action.view)}', ${JSON.stringify(parseQuery(action.query)).replace(/"/g, '&quot;')})" style="cursor:pointer;"`
        : '';
      return `<div class="alert-item alert-${esc(sev)}" ${click}>
        <div class="alert-title">${esc(al.title)}</div>
        ${al.description ? `<div class="alert-desc">${esc(al.description)}</div>` : ''}
        ${action.view ? '<div class="alert-action">点击查看 →</div>' : ''}
      </div>`;
    }).join('');
    return `<div class="alerts-banner">${items}</div>`;
  }

  // 把 "tag=BLACKLIST&foo=bar" 转成对象
  function parseQuery(q) {
    if (!q) return {};
    return q.split('&').reduce((acc, p) => {
      const [k, v] = p.split('=');
      if (k) acc[k] = v || '';
      return acc;
    }, {});
  }

  function renderBarList(rows) {
    if (!rows || rows.length === 0) return renderEmpty('暂无数据', null, 'chart');
    const max = Math.max(...rows.map(r => r.count), 1);
    return '<div class="bar-list">' + rows.map(r => `
      <div class="bar-row">
        <div class="name">${esc(r.name)}</div>
        <div class="bar"><div class="fill" style="width:${(r.count / max * 100).toFixed(1)}%;"></div></div>
        <div class="num">${r.count}</div>
      </div>
    `).join('') + '</div>';
  }

    const [h, m] = a.time.split(':');
    return `<div class="upcoming-card ${cls}">

        <div class="t">${h}:${m}</div>
        <div class="m">${fmtRelative(dist)}</div>

  function renderHandoffs() {
    const list = state.handoffs || [];
    const showResolved = state.showResolvedHandoffs;
    const pending = list.filter(h => !state.handoffsResolved[h.id]);
    const resolved = list.filter(h => state.handoffsResolved[h.id]);
    const display = showResolved ? list : pending;

    if (!list.length) {
      return `<div class="view-head">
        <h1>转人工</h1>
        <p>Agent 主动转给人工的请求，便于你直接跟进</p>
      </div>

    }

    return `<div class="view-head">
      <h1>转人工</h1>
      <p>共 ${list.length} 条 · 待处理 <strong style="color:var(--red);">${pending.length}</strong> · 已处理 ${resolved.length}</p>
    </div>

    <div class="row" style="margin-bottom: 16px; gap: 12px;">
      <div class="seg" role="tablist" aria-label="转人工筛选">

      </div>
    </div>

    <div class="handoff-list">
      ${display.length === 0
        ? '<div class="card card-pad">' + renderEmpty(showResolved ? '还没有已处理的转人工' : '所有转人工都已处理 ✓', '切换到「已处理」查看历史', 'inbox') + '</div>'
        : display.map(renderHandoffCard).join('')}

    const reason = h.reason || '未填写原因';
    const resolved = state.handoffsResolved[h.id];
    return `<div class="handoff-card ${resolved ? 'resolved' : ''}">
      <div>
        <div class="reason">${esc(name)} · ${esc(reason)}</div>
        <div class="meta">顾客 ID：<span class="text-mono">${esc(h.customer_id || '—')}</span></div>

          ? `<span class="resolved-mark">✓ 已处理 · ${esc((resolved.resolved_at || '').slice(0, 16).replace('T', ' '))} · 商户 #${esc(resolved.resolved_by || '?')}</span>
             ${resolved.note ? `<span class="text-muted" style="font-size:12px;">"${esc(resolved.note)}"</span>` : ''}`

  function renderServiceRows() {
    const rows = state.services || [];
    if (!rows.length) {
      return '<div style="padding:20px;">' + renderEmpty('还没有服务', '点击右上角"新增服务"开始', 'plus') + '</div>';
    }
    // v4.9 判断是否跨店：service 的 shop_id 是否多于 1 个
    const shopIds = Array.from(new Set(rows.map(r => r.shop_id)));
    const isCrossShop = shopIds.length > 1;

    const header = `<div class="service-row" style="background:var(--surface-2);font-size:11px;font-weight:600;text-transform:uppercase;color:var(--ink-muted);letter-spacing:.04em;">
      <div>服务名</div><div>${isCrossShop ? '商户' : '商户'}</div><div>预估时长</div><div>价格区间</div><div class="num">操作</div>
    </div>`;

    if (!isCrossShop) {
      // 单店模式：直接列表
      return header + rows.map(renderServiceRow).join('');
    }

    // 跨店模式：按 shop_id 分组（接口已 ORDER BY shop_id ASC）
    const groups = [];
    let curShop = null;
    let curGroup = null;
    for (const r of rows) {
      if (r.shop_id !== curShop) {
        curShop = r.shop_id;
        curGroup = { shop_id: r.shop_id, shop_name: r.shop_name || r.shop_id, items: [] };
        groups.push(curGroup);
      }
      curGroup.items.push(r);
    }
    let html = header;
    for (const g of groups) {
      html += `<div class="service-shop-head">
        <span class="shop-pill">${esc(g.shop_name)}</span>
        <span class="text-muted" style="font-weight:400;">${esc(g.shop_id)}</span>
        <span class="shop-count">${g.items.length} 项</span>
      </div>`;
      html += g.items.map(renderServiceRow).join('');
    }
    return html;
  }

  //   POST   /api/admin/members              createMemberHandler

  //
  // ROLES_REQUIRED 已配 'members': ['owner']（staff 故意禁）
  function renderMembers() {
    const me = state.user || {};

      : me.role === 'staff' ? '店员'

    return `<div class="view-head">

  function renderMemberRows() {
    const rows = state.members || [];
    if (!rows.length) {
      return '<div style="padding:20px;">' + renderEmpty('还没有成员', '点击右上角"新增成员"开始', 'user-plus') + '</div>';
    }
    const header = `<div class="member-row" style="background:var(--surface-2);font-size:11px;font-weight:600;text-transform:uppercase;color:var(--ink-muted);letter-spacing:.04em;">
      <div>用户名</div><div>角色</div><div>状态</div><div>最后登录</div><div class="num">操作</div>
    </div>`;

  function renderMemberRow(m) {
    const me = state.user || {};
    const isMe = m.id === me.admin_id;
    const status = (m.status === 'active' || !m.status) ? 'active' : 'disabled';
    // role 中文 + 3 色 pill（owner / staff / platform_admin）
    const rolePill = m.role === 'owner'
      ? '<span class="role-pill role-pill-owner">店主</span>'
      : m.role === 'staff'
        ? '<span class="role-pill role-pill-staff">店员</span>'
        : m.role === 'platform_admin'
          ? '<span class="role-pill role-pill-platform">平台超管</span>'
          : `<span class="role-pill">${esc(m.role || '?')}</span>`;
    const statusPill = status === 'active'
      ? '<span class="status-pill status-pill-active">活跃</span>'
      : '<span class="status-pill status-pill-disabled">已停用</span>';
    const lastLogin = m.last_login_at ? m.last_login_at.slice(0, 19).replace('T', ' ') : '—';
    // 操作按钮规则：
    //   - 自己：所有操作禁掉（防误操作把自己降级 / 停用；改自己密码走 /change-password 单独流程）
    //   - 对方：可改 role / 重置密码 / 停用
    //   - platform_admin 行：不显示操作按钮（platform_admin 跨店超管，UI 不应误改）
    //   - last-owner 保护在 changeMemberRoleHandler / disableMemberHandler 服务端做
    const actions = [];
    if (isMe) {
      actions.push(`<span class="text-muted" style="font-size:11px;">自己</span>`);
    } else if (m.role === 'platform_admin') {
      actions.push(`<span class="text-muted" style="font-size:11px;">平台超管（不可改）</span>`);
    } else {
      const newRole = m.role === 'owner' ? 'staff' : 'owner';
      actions.push(`<button class="btn btn-sm" onclick="App.changeMemberRole(${m.id},'${newRole}')">改为${newRole === 'owner' ? '店主' : '店员'}</button>`);
      actions.push(`<button class="btn btn-sm" onclick="App.openResetPasswordModal(${m.id},'${esc(m.username)}')">重置密码</button>`);
      if (status === 'active') {
        actions.push(`<button class="btn btn-sm btn-danger" onclick="App.disableMember(${m.id},'${esc(m.username)}')">停用</button>`);
      }
    }
    return `<div class="member-row ${status === 'disabled' ? 'inactive' : ''}">
      <div class="name">
        <b>${esc(m.username)}</b>${isMe ? ' <span class="text-muted" style="font-weight:400;font-size:11px;">· 我</span>' : ''}
      </div>
      <div>${rolePill}</div>
      <div>${statusPill}</div>
      <div class="text-muted text-mono">${esc(lastLogin)}</div>
      <div class="num">
        ${actions.join('')}
      </div>
    </div>`;
  }

  // ---------- Members ops (v4.11) ----------
  function openMemberModal() {
    openModal('memberCreate', {});
  }
  async function submitMember() {
    const username = $('#mbUsername').value.trim();
    const password = $('#mbPassword').value;
    const role = $('#mbRole').value;
    const errEl = $('#mbErr');
    if (errEl) errEl.classList.add('hidden');
    if (username.length < 3 || username.length > 32) {
      if (errEl) { errEl.textContent = '用户名长度必须在 3-32 字'; errEl.classList.remove('hidden'); }
      return;
    }
    if (password.length < 6) {
      if (errEl) { errEl.textContent = '密码至少 6 位'; errEl.classList.remove('hidden'); }
      return;
    }
    try {
      await api('/api/admin/members', { method: 'POST', body: { username, password, role } });
      closeModal();
      showToast('已新增成员 ' + username, 'success');
      loadMembers();
    } catch (e) {
      if (errEl) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
    }
  }
  async function changeMemberRole(id, newRole) {
    if (!confirm(`确定改为「${newRole === 'owner' ? '店主' : '店员'}」吗？\n\n注意：本店最后一个 owner 会被服务端拒绝降级`)) return;
    try {
      await api(`/api/admin/members/${id}/role`, { method: 'PUT', body: { role: newRole } });
      showToast('已更新角色', 'success');
      loadMembers();
    } catch (e) {
      showToast('改角色失败：' + e.message, 'error');
    }
  }
  function openResetPasswordModal(id, username) {
    openModal('resetPassword', { targetId: id, targetUsername: username });
  }
  async function submitResetPassword() {
    const d = state.modal.data;
    const np = $('#rpNewPassword').value;
    const errEl = $('#rpErr');
    if (errEl) errEl.classList.add('hidden');
    if (np.length < 6) {
      if (errEl) { errEl.textContent = '新密码至少 6 位'; errEl.classList.remove('hidden'); }
      return;
    }
    try {
      await api(`/api/admin/members/${d.targetId}/reset-password`, { method: 'POST', body: { new_password: np } });
      closeModal();
      showToast(`已重置 ${d.targetUsername} 的密码`, 'success');
    } catch (e) {
      if (errEl) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
    }
  }
  async function disableMember(id, username) {
    if (!confirm(`确定停用「${username}」吗？\n\n停用后该账号无法登录，店主可重新启用（v4.11 后端没启启用接口，停用 = 永久）。\n注意：本店最后一个 active owner 会被服务端拒绝`)) return;
    try {
      await api(`/api/admin/members/${id}`, { method: 'DELETE' });
      showToast(`已停用 ${username}`, 'success');
      loadMembers();
    } catch (e) {
      showToast('停用失败：' + e.message, 'error');
    }
  }

          : `<table class="table">
            <thead><tr><th>套餐</th><th>开始</th><th>到期</th><th>状态</th><th>自动续费</th></tr></thead>
            <tbody>${list.map(s => `<tr>
              <td>${planPill(s.plan)}</td>
              <td class="text-mono">${esc(s.started_at.slice(0,10))}</td>
              <td class="text-mono">${esc(s.expires_at.slice(0,10))}</td>
              <td>${s.is_current ? '<span class="badge badge-active">生效中</span>' : (s.cancelled_at ? '<span class="badge badge-cancelled">已取消</span>' : '<span class="badge badge-warning">已过期</span>')}</td>
              <td>${s.auto_renew ? '是' : '否'}</td>
            </tr>`).join('')}</tbody>
          </table>`}
      </div>
    </div>`;
  }

  function planPill(plan) {
    const cls = plan === 'flagship' ? 'plan-flagship' : plan === 'pro' ? 'plan-pro' : '';
    const label = plan === 'flagship' ? '旗舰' : plan === 'pro' ? '专业' : plan === 'basic' ? '基础' : (plan || '—');
    return `<span class="plan-pill ${cls}">${esc(label)}</span>`;
  }

  function daysLeft(expiresAt) {
    if (!expiresAt) return 0;
    const ms = new Date(expiresAt) - new Date();
    return Math.max(0, Math.ceil(ms / (24 * 3600 * 1000)));
  }

  function renderWeeklyBody(r) {

    const noshow = r.noshow_appointments || 0;
    const cancelled = r.cancelled_appointments || 0;
    const active = r.active_appointments || 0;

      <div class="kpi-grid">
        ${kpiCard('总预约', total, 'info', `${start} ~ ${end}`)}
        ${kpiCard('已完成', completed, 'success', `完成率 ${fmtPct(r.completion_rate || 0)}`)}
        ${kpiCard('爽约', noshow, noshow > 0 ? 'alert' : 'normal', `爽约率 ${fmtPct(r.noshow_rate || 0)}`)}
        ${kpiCard('已取消', cancelled, 'normal', '')}
        ${kpiCard('待到店', active, 'normal', '')}
        ${kpiCard('周环比（总数）', growthSign + growthPct + '%', growthCls,
          `上周 ${r.last_week_total} 单 → 本周 ${total} 单`)}

      <div class="section">
        <div class="card card-pad">
          <div class="section-head">

            <span class="sub">Top ${(r.service_rank || []).length}</span>

          <div class="section-head">
            <h2>顾客排行</h2>
            <span class="sub">Top ${(r.top_customers || []).length}</span>

  function renderWeeklyDailyChart(rows) {
    if (!rows.length) return renderEmpty('暂无 7 天数据', null, 'chart');
    const max = Math.max(...rows.map(r => r.count || 0), 1);
    // 周一在前（v4.3 默认就是 [now-7d, now) ASC；后端 fillDailyTrend 已补 0）
    return '<div class="bar-list">' + rows.map(r => {
      const date = (r.date || '').slice(5); // MM-DD
      const dow = weekdayOf(r.date);
      return `<div class="bar-row" style="grid-template-columns: 70px 1fr 40px;">
        <div class="name text-mono">${esc(date)} ${esc(dow)}</div>
        <div class="bar"><div class="fill" style="width:${((r.count || 0) / max * 100).toFixed(1)}%;"></div></div>
        <div class="num">${r.count || 0}</div>
      </div>`;
    }).join('') + '</div>';
  }

  function weekdayOf(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d)) return '';
    return '周' + '日一二三四五六'[d.getDay()];
  }

  function renderRankList(rows) {
    if (!rows.length) return renderEmpty('暂无数据', null, 'user');
    const max = Math.max(...rows.map(r => r.count), 1);
    return '<div class="bar-list">' + rows.map((r, i) => {
      const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
      return `<div class="bar-row" style="grid-template-columns: 24px 90px 1fr 50px;">
        <div style="text-align:center;">${medal}</div>
        <div class="name">${esc(r.name)}</div>
        <div class="bar"><div class="fill" style="width:${(r.count / max * 100).toFixed(1)}%;"></div></div>
        <div class="num">${r.count}</div>
      </div>`;
    }).join('') + '</div>';
  }

  // ---------- Notifications view (v4.10.1 PRD §11.7 P4 配套：admin 后台看 leave notify 发送结果 + 补发) ----------
  //
  // 列出本店所有 leave 通知（sent / failed / skipped / pending），带状态/类型/leave 过滤
  // failed / pending / skipped 显示"补发"按钮
  //
  // 设计要点：
  //   - 用 status / type / leave_id 三个下拉过滤，URL 也带 query 方便回链
  //   - 顶部 "一键补发" 按钮只对 status=failed 的总数 > 0 时启用（避免空操作）
  //   - 失败行高亮（红底）让商户一眼看到哪些没发出去
  //   - 重发按钮 disabled while pending（防双击）

  function renderNotifications() {
    const list = state.notifications || [];
    const f = state.notifFilter || {};
    const failedCount = list.filter(n => n.status === 'failed').length;
    const totalCount = list.length;

    return `
      <div class="view-head">
        <h1>通知中心</h1>
        <p>理发师请假通知顾客的发送记录 · 失败/跳过可一键补发</p>
      </div>

      <div class="filterbar">
        <div class="field">
          <label>状态</label>
          <select class="select" id="notifStatus" onchange="App.loadNotifications()">
            <option value="" ${f.status === '' ? 'selected' : ''}>全部</option>
            <option value="failed" ${f.status === 'failed' ? 'selected' : ''}>失败 (failed)</option>
            <option value="skipped" ${f.status === 'skipped' ? 'selected' : ''}>跳过 (skipped)</option>
            <option value="sent" ${f.status === 'sent' ? 'selected' : ''}>成功 (sent)</option>
            <option value="pending" ${f.status === 'pending' ? 'selected' : ''}>待发 (pending)</option>
          </select>
        </div>
        <div class="field">
          <label>类型</label>
          <select class="select" id="notifType" onchange="App.loadNotifications()">
            <option value="" ${f.type === '' ? 'selected' : ''}>全部</option>
            <option value="leave_cancel" ${f.type === 'leave_cancel' ? 'selected' : ''}>请假·取消</option>
            <option value="leave_reschedule" ${f.type === 'leave_reschedule' ? 'selected' : ''}>请假·改派</option>
            <option value="leave_no_contact" ${f.type === 'leave_no_contact' ? 'selected' : ''}>请假·无联系方式</option>
          </select>
        </div>
        <div class="field" style="min-width:220px;">
          <label>关联请假 ID</label>
          <input class="input" id="notifLeaveId" placeholder="可选 · 留空看全部" value="${esc(f.leave_id || '')}" />
        </div>
        <button class="btn btn-primary" onclick="App.loadNotifications()">查询</button>
        <span class="spacer"></span>
        ${failedCount > 0
          ? `<button class="btn btn-warning" onclick="App.retryAllFailedNotifications()" id="retryAllBtn">一键补发 ${failedCount} 条失败</button>`
          : `<button class="btn btn-ghost" disabled>无失败通知</button>`}
        <span class="text-muted" id="notifTs" style="font-size:12px;"></span>
      </div>

      <div class="card">
        <div style="overflow-x:auto;">
          ${totalCount === 0
            ? '<div style="padding:20px;">' + renderEmpty('还没有通知记录', '理发师请假时会自动写入；或调整上方筛选', 'bell') + '</div>'
            : renderNotificationTable(list)}
        </div>
      </div>
    `;
  }

  function renderNotificationTable(rows) {
    // 状态徽章：sent=绿 / failed=红 / skipped=灰 / pending=黄
    const statusBadge = (s) => {
      switch (s) {
        case 'sent': return '<span class="badge badge-completed">已发送</span>';
        case 'failed': return '<span class="badge badge-noshow">失败</span>';
        case 'skipped': return '<span class="badge badge-cancelled">跳过</span>';
        case 'pending': return '<span class="badge badge-warning">待发</span>';
        default: return '<span class="badge">' + esc(s) + '</span>';
      }
    };
    // 通道徽章
    const channelLabel = (c) => {
      switch (c) {
        case 'wecom_kf': return '微信客服';
        case 'wecom_app': return '企业应用';
        case 'sms': return '短信';
        case 'pending': return '—';
        default: return c || '—';
      }
    };
    // 类型标签
    const typeLabel = (t) => {
      switch (t) {
        case 'leave_cancel': return '<span class="badge">取消</span>';
        case 'leave_reschedule': return '<span class="badge badge-info">改派</span>';
        case 'leave_no_contact': return '<span class="badge badge-warning">无联系方式</span>';
        default: return '<span class="badge">' + esc(t) + '</span>';
      }
    };
    return `<table class="table notif-table">
      <thead><tr>
        <th>时间</th>
        <th>类型</th>
        <th>状态</th>
        <th>通道</th>
        <th>顾客</th>
        <th>文案预览</th>
        <th>尝试</th>
        <th>错误</th>
        <th class="num">操作</th>
      </tr></thead>
      <tbody>${rows.map(n => {
        const canRetry = n.status === 'failed' || n.status === 'skipped' || n.status === 'pending';
        const rowClass = n.status === 'failed' ? 'class="row-failed"' : '';
        return `<tr ${rowClass}>
          <td class="text-mono" style="white-space:nowrap;">${esc((n.created_at || '').slice(0, 19).replace('T', ' '))}</td>
          <td>${typeLabel(n.type)}</td>
          <td>${statusBadge(n.status)}</td>
          <td style="font-size:12px;">${channelLabel(n.channel)}</td>
          <td class="text-mono" style="font-size:11px;">${esc(n.customer_id || '—')}</td>
          <td class="text-muted" style="max-width:280px;font-size:12px;line-height:1.5;">${esc((n.text_preview || '').slice(0, 80))}${(n.text_preview || '').length > 80 ? '…' : ''}</td>
          <td class="text-mono" style="text-align:center;">${n.attempt_count || 0}</td>
          <td class="text-muted" style="max-width:200px;font-size:11px;line-height:1.5;">${esc((n.error || '').slice(0, 100))}</td>
          <td class="num" style="white-space:nowrap;">
            ${canRetry
              ? `<button class="btn btn-sm btn-warning" onclick="App.retryOneNotification(${n.id}, this)" id="retryBtn${n.id}">补发</button>`
              : `<span class="text-muted" style="font-size:11px;">—</span>`}
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  }

  // ---------- Icons ----------
  function icon(name, size = 18) {
    const s = size;
    const c = `width:${s};height:${s};`;
    const paths = {
      plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
      x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
      inbox: '<polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>',
      calendar: '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',

      search: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
      'user-plus': '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>',
      user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
      building: '<path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/><line x1="9" y1="9" x2="9" y2="9"/><line x1="9" y1="12" x2="9" y2="12"/><line x1="9" y1="15" x2="9" y2="15"/><line x1="9" y1="18" x2="9" y2="18"/>',
      activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
      bell: '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>',
      mail: '<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>',
    };
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="${c}">${paths[name] || ''}</svg>`;
  }

  // ---------- Modals ----------
  function openModal(kind, data) {
    state.modal = { kind, data };
    const root = $('#modalRoot');
    let body = '';
    if (kind === 'newBarber') body = newBarberModal();
    else if (kind === 'leave') body = leaveModal(data);
    else if (kind === 'password') body = passwordModal();
    else if (kind === 'confirm') body = confirmModal(data);
    else if (kind === 'custTag') body = custTagModal(data);
    else if (kind === 'service') body = serviceModal(data);
    else if (kind === 'renew') body = renewModal();
    else if (kind === 'shopEdit') body = shopEditModal();
    else if (kind === 'customerDetail') body = customerDetailModal();
    else if (kind === 'handoffResolve') body = handoffResolveModal(data);
    else if (kind === 'serviceImport') body = serviceImportModal();
    else if (kind === 'memberCreate') body = memberCreateModal();
    else if (kind === 'resetPassword') body = resetPasswordModal(data);
    else return;
    root.innerHTML = body;
    // wire submit buttons by id
    if (kind === 'newBarber') {
      $('#newBarberName')?.focus();
      $('#newBarberName').addEventListener('keydown', e => { if (e.key === 'Enter') $('#newBarberSkills').focus(); });
    } else if (kind === 'leave') {
      $('#leaveStartAt')?.focus();
    } else if (kind === 'password') {
      $('#oldPwd')?.focus();
    } else if (kind === 'service') {
      $('#svcName')?.focus();
    } else if (kind === 'shopEdit') {
      $('#shopName')?.focus();
    } else if (kind === 'handoffResolve') {
      $('#handoffResolveNote')?.focus();
    } else if (kind === 'serviceImport') {
      $('#svcImportFile')?.addEventListener('change', App.onServiceImportFile);
    } else if (kind === 'memberCreate') {
      $('#mbUsername')?.focus();
    } else if (kind === 'resetPassword') {
      $('#rpNewPassword')?.focus();
    } else if (kind === 'confirm') {
      // v4.6 修复:把 callback 绑在 .js-confirm-btn 上,保留 IIFE 闭包
      const btn = root.querySelector('.js-confirm-btn');
      if (btn && data && typeof data.onConfirm === 'function') {
        btn.addEventListener('click', async () => {
          const cb = data.onConfirm;
          closeModal();
          try { await cb(); } catch (_) { /* swallow; handler 已自己处理 */ }
        });
      }
    }
  }
  function closeModal() {
    state.modal = null;
    state.customerDetail = null;
    state.customerDetailLoading = false;
    $('#modalRoot').innerHTML = '';
  }

  // ESC 键关闭 modal（v4.6 可访问性）
  function handleGlobalKeydown(e) {
    if (e.key === 'Escape' && state.modal) {
      // confirm modal 不让 ESC 关闭，避免误操作
      if (state.modal.kind !== 'confirm') closeModal();
    }
  }
