services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chatwitheino
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      MYSQL_APP_PASSWORD: ${MYSQL_APP_PASSWORD:-openbook-local-only}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  db-bootstrap:
    image: mysql:8.0
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_APP_PASSWORD: ${MYSQL_APP_PASSWORD:-openbook-local-only}
    command:
      - /bin/sh
      - -ec
      - |
        mysql -hmysql -uroot -p"$$MYSQL_ROOT_PASSWORD" <<SQL
        CREATE USER IF NOT EXISTS 'openbook'@'%' IDENTIFIED BY '$$MYSQL_APP_PASSWORD';
        ALTER USER 'openbook'@'%' IDENTIFIED BY '$$MYSQL_APP_PASSWORD';
        GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, ALTER, INDEX, REFERENCES ON chatwitheino.* TO 'openbook'@'%';
        FLUSH PRIVILEGES;
        SQL

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: openbook
      MYSQL_PASS: ${MYSQL_APP_PASSWORD:-openbook-local-only}
      MYSQL_DB: chatwitheino
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      # LLM 配置：按 .env 中的 provider 专属变量注入。
      MESSAGE_KIND: ${MESSAGE_KIND:-message}
      MODEL_TYPE: ${MODEL_TYPE:-}
      OPENBOOK_LLM_CHAIN: ${OPENBOOK_LLM_CHAIN:-deepseek,openai,ark}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ARK_API_KEY: ${ARK_API_KEY:-}
      ARK_MODEL: ${ARK_MODEL:-}
      ARK_BASE_URL: ${ARK_BASE_URL:-}
      # 企业微信
      WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
      WECOM_SECRET: ${WECOM_SECRET:-}
      WECOM_TOKEN: ${WECOM_TOKEN:-}
      WECOM_ENCODING_AES_KEY: ${WECOM_ENCODING_AES_KEY:-}
      WECOM_KF_LINK: ${WECOM_KF_LINK:-}
      # Default to a safe local demonstration mode: replies are recorded instead
      # of being sent to a real enterprise-WeChat account.
      AGENT_REPLY_MODE: ${AGENT_REPLY_MODE:-mock}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-change-me-before-exposing}
      DEFAULT_PLATFORM_ADMIN_USERNAME: ${DEFAULT_PLATFORM_ADMIN_USERNAME:-platform}
      DEFAULT_PLATFORM_ADMIN_PASSWORD: ${DEFAULT_PLATFORM_ADMIN_PASSWORD:-change-me-before-exposing}
      PORT: "38080"
      PPROF_ADDR: 0.0.0.0:6060
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:38080:38080"
      - "127.0.0.1:6060:6060"
    volumes:
      - app_data:/app/data

volumes:
  mysql_data:
  app_data:
